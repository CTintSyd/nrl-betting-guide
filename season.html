<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season Dashboard — NRL Betting Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00a651; --green-dark: #007a3c;
      --dark: #0d1117; --dark-2: #161b22; --dark-3: #21262d;
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3; --text-2: #8b949e;
      --radius: 12px; --radius-sm: 8px;
      --font: 'Inter', system-ui, sans-serif;
      --font-heading: 'Barlow Condensed', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--dark); color: var(--text); line-height: 1.6; font-size: 15px; }
    a { color: var(--green); text-decoration: none; }
    .container { max-width: 1040px; margin: 0 auto; padding: 0 24px; }

    /* ── Nav ── */
    .nav { background: rgba(13,17,23,0.97); border-bottom: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
    .nav__inner { display: flex; align-items: center; gap: 12px; }
    .nav__logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.05rem; color: #fff; }
    .nav__logo span { color: var(--green); }
    .nav__link { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--text-2); padding: 7px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
    .nav__link:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── Hero ── */
    .hero { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); border-bottom: 1px solid var(--border); padding: 36px 0 28px; }
    .hero-title { font-family: var(--font-heading); font-size: 2.4rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .hero-title span { color: var(--green); }
    .hero-sub { color: var(--text-2); font-size: 0.9rem; }

    /* ── Stat cards ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 28px 0 0; }
    .stat-card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
    .stat-card-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-2); margin-bottom: 6px; }
    .stat-card-val { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; color: #fff; line-height: 1; }
    .stat-card-sub { font-size: 0.72rem; color: var(--text-2); margin-top: 4px; }
    .stat-card-val.green { color: var(--green); }
    .stat-card-val.amber { color: #f0a500; }
    .stat-card-val.red   { color: #f85149; }

    /* ── Section layout ── */
    .sections { padding: 28px 0 60px; display: flex; flex-direction: column; gap: 28px; }
    .section-title { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--green); margin-bottom: 14px; }

    /* ── Fav record chart ── */
    .fav-chart { display: flex; flex-direction: column; gap: 0; }
    .fav-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .fav-row:last-child { border-bottom: none; }
    .fav-round { font-size: 0.78rem; font-weight: 700; color: var(--text-2); width: 46px; flex-shrink: 0; }
    .fav-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 100px; height: 8px; overflow: hidden; }
    .fav-bar { height: 100%; border-radius: 100px; }
    .fav-bar.good  { background: var(--green); }
    .fav-bar.mid   { background: #f0a500; }
    .fav-bar.bad   { background: #f85149; }
    .fav-record { font-size: 0.78rem; font-weight: 700; color: var(--text); width: 36px; text-align: right; flex-shrink: 0; }
    .fav-pct { font-size: 0.72rem; color: var(--text-2); width: 38px; text-align: right; flex-shrink: 0; }
    .season-total-row { display: flex; align-items: center; gap: 10px; padding: 12px 0 2px; border-top: 2px solid rgba(255,255,255,0.1); margin-top: 4px; }
    .season-total-label { font-size: 0.78rem; font-weight: 800; color: #fff; width: 46px; flex-shrink: 0; }

    /* ── Round results table ── */
    .round-table { width: 100%; border-collapse: collapse; }
    .round-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .round-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; vertical-align: top; }
    .round-table tr:last-child td { border-bottom: none; }
    .round-num { font-weight: 700; color: var(--text-2); }
    .game-result { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 0.78rem; }
    .game-result:last-child { margin-bottom: 0; }
    .fav-icon { font-size: 0.72rem; }
    .fav-win  { color: var(--green); }
    .fav-loss { color: #f85149; }
    .result-score { font-variant-numeric: tabular-nums; font-weight: 600; }
    .record-pill { display: inline-block; font-size: 0.7rem; font-weight: 800; padding: 2px 8px; border-radius: 100px; }
    .pill-good  { background: rgba(63,185,80,.15);  color: #3fb950; }
    .pill-mid   { background: rgba(240,165,0,.15);  color: #f0a500; }
    .pill-bad   { background: rgba(248,81,73,.15);  color: #f85149; }

    /* ── Ladder table ── */
    .ladder-table { width: 100%; border-collapse: collapse; }
    .ladder-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: right; }
    .ladder-table th:nth-child(1), .ladder-table th:nth-child(2) { text-align: left; }
    .ladder-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; text-align: right; }
    .ladder-table td:nth-child(1), .ladder-table td:nth-child(2) { text-align: left; }
    .ladder-table tr:last-child td { border-bottom: none; }
    .ladder-table tr.top4 td { border-left: none; }
    .ladder-table tr.top4 td:first-child { border-left: 3px solid var(--green); }
    .ladder-table tr.top8 td:first-child { border-left: 3px solid #f0a500; }
    .ladder-table tr.out  td:first-child { border-left: 3px solid transparent; }
    .ladder-table tr.cutoff td { border-bottom: 2px dashed rgba(240,165,0,0.4); }
    .l-pos  { font-weight: 800; color: var(--text-2); font-size: 0.9rem; }
    .l-team { font-weight: 600; }
    .l-nick { font-size: 0.72rem; color: var(--text-2); display: block; }
    .l-streak-w { color: var(--green); font-weight: 700; font-size: 0.75rem; }
    .l-streak-l { color: #f85149; font-weight: 700; font-size: 0.75rem; }
    .l-diff-pos { color: var(--green); font-weight: 600; }
    .l-diff-neg { color: #f85149; font-weight: 600; }
    .l-pts { font-weight: 800; color: #fff; }
    .l-avg { font-size: 0.78rem; color: var(--text-2); }

    /* ── Trend table (scoring) ── */
    .trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .trend-team-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); margin-bottom: 8px; }
    .trend-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.82rem; }
    .trend-row:last-child { border-bottom: none; }
    .trend-rank { font-size: 0.7rem; font-weight: 800; color: var(--text-2); width: 20px; flex-shrink: 0; }
    .trend-name { flex: 1; font-weight: 500; }
    .trend-val { font-weight: 700; font-family: var(--font-heading); font-size: 1rem; }
    .trend-val.high { color: var(--green); }
    .trend-val.low  { color: #f85149; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-2); }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer { border-top: 1px solid var(--border); padding: 24px 0; text-align: center; color: var(--text-2); font-size: 0.78rem; }

    /* ── Season sections (new) ── */
    .season-section { }
    .season-section-title { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* ── New ladder (with logos) ── */
    .new-ladder-table { width: 100%; border-collapse: collapse; }
    .new-ladder-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: right; }
    .new-ladder-table th:nth-child(1), .new-ladder-table th:nth-child(2) { text-align: left; }
    .new-ladder-table td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; text-align: right; vertical-align: middle; }
    .new-ladder-table td:nth-child(1), .new-ladder-table td:nth-child(2) { text-align: left; }
    .new-ladder-table tr:last-child td { border-bottom: none; }
    .new-ladder-table tr.top4 td:first-child { border-left: 3px solid var(--green); }
    .new-ladder-table tr.top8 td:first-child { border-left: 3px solid #f0a500; }
    .new-ladder-table tr.out  td:first-child { border-left: 3px solid transparent; }
    .new-ladder-table tr.cutoff td { border-bottom: 2px dashed rgba(240,165,0,0.4); }
    .nl-team-cell { display: flex; align-items: center; gap: 8px; }
    .nl-logo { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
    .nl-name { font-weight: 600; font-size: 0.82rem; }
    .nl-nick { font-size: 0.68rem; color: var(--text-2); }

    /* ── O/U chart ── */
    .ou-chart { display: flex; flex-direction: column; gap: 2px; }
    .ou-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ou-row:last-child { border-bottom: none; }
    .ou-round-label { font-size: 0.75rem; font-weight: 700; color: var(--text-2); width: 36px; flex-shrink: 0; }
    .ou-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .ou-bar-row { display: flex; align-items: center; gap: 5px; height: 16px; }
    .ou-bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 14px; overflow: hidden; position: relative; }
    .ou-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .ou-bar-fill.over  { background: var(--green); }
    .ou-bar-fill.under { background: #f85149; }
    .ou-bar-count { font-size: 0.72rem; font-weight: 700; width: 18px; flex-shrink: 0; }
    .ou-bar-count.over  { color: var(--green); }
    .ou-bar-count.under { color: #f85149; }
    .ou-bar-label { font-size: 0.65rem; color: var(--text-2); width: 32px; flex-shrink: 0; }
    .ou-total-row { display: flex; align-items: center; gap: 8px; padding: 10px 0 2px; border-top: 2px solid rgba(255,255,255,0.1); margin-top: 4px; }
    .ou-total-label { font-size: 0.78rem; font-weight: 800; color: #fff; width: 36px; flex-shrink: 0; }
    .ou-pills { display: flex; gap: 6px; align-items: center; }
    .ou-pill-over  { background: rgba(0,166,81,.2);  color: var(--green); font-size: 0.75rem; font-weight: 800; padding: 3px 10px; border-radius: 100px; }
    .ou-pill-under { background: rgba(248,81,73,.2);  color: #f85149; font-size: 0.75rem; font-weight: 800; padding: 3px 10px; border-radius: 100px; }

    /* ── Upsets table ── */
    .upsets-table { width: 100%; border-collapse: collapse; }
    .upsets-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .upsets-table th:last-child { text-align: right; }
    .upsets-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; vertical-align: middle; }
    .upsets-table tr:last-child td { border-bottom: none; }
    .upsets-rank { font-weight: 800; color: var(--text-2); width: 24px; }
    .upsets-score { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; white-space: nowrap; }
    .upsets-winner { color: var(--green); font-weight: 600; }
    .upsets-margin { font-weight: 800; color: #f85149; text-align: right; }
    .upsets-fav { font-size: 0.72rem; color: var(--text-2); }

    /* ── Team form grid ── */
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .form-cell { background: var(--dark-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
    .form-team-name { font-size: 0.78rem; font-weight: 700; color: var(--text); margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .form-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .form-pill { font-size: 0.68rem; font-weight: 800; padding: 2px 7px; border-radius: 100px; line-height: 1.4; }
    .form-pill-w { background: rgba(0,166,81,.2);  color: var(--green); }
    .form-pill-l { background: rgba(248,81,73,.2);  color: #f85149; }
    .form-pill-d { background: rgba(255,255,255,.1); color: var(--text-2); }

    /* ── Fav reliability ── */
    .rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .rel-list { display: flex; flex-direction: column; gap: 0; }
    .rel-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .rel-row:last-child { border-bottom: none; }
    .rel-rank { font-size: 0.72rem; font-weight: 800; color: var(--text-2); width: 20px; flex-shrink: 0; }
    .rel-name { flex: 1; font-size: 0.82rem; font-weight: 600; }
    .rel-record { font-size: 0.78rem; color: var(--text-2); width: 44px; flex-shrink: 0; }
    .rel-bar-wrap { width: 60px; background: rgba(255,255,255,0.06); border-radius: 100px; height: 6px; overflow: hidden; flex-shrink: 0; }
    .rel-bar { height: 100%; border-radius: 100px; }
    .rel-bar.good { background: var(--green); }
    .rel-bar.bad  { background: #f85149; }
    .rel-pct { font-size: 0.72rem; font-weight: 700; width: 34px; text-align: right; flex-shrink: 0; }
    .rel-pct.good { color: var(--green); }
    .rel-pct.bad  { color: #f85149; }
    .rel-section-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); margin-bottom: 10px; }

    /* ── Scoring records ── */
    .records-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .record-card { background: var(--dark-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .record-card-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-2); margin-bottom: 6px; }
    .record-card-val { font-family: var(--font-heading); font-size: 1.7rem; font-weight: 800; color: #fff; line-height: 1.1; }
    .record-card-val.green { color: var(--green); }
    .record-card-val.amber { color: #f0a500; }
    .record-card-val.red   { color: #f85149; }
    .record-card-detail { font-size: 0.7rem; color: var(--text-2); margin-top: 5px; line-height: 1.4; }

    /* ── Best value wins ── */
    .value-table { width: 100%; border-collapse: collapse; }
    .value-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .value-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
    .value-table tr:last-child td { border-bottom: none; }
    .value-badge { display: inline-block; font-size: 0.7rem; font-weight: 800; padding: 2px 8px; border-radius: 100px; background: rgba(240,165,0,.15); color: #f0a500; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .trend-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 1.8rem; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .records-grid { grid-template-columns: 1fr 1fr; }
      .rel-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .records-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container nav__inner">
      <div class="nav__logo">🏉 NRL<span>Betting</span>Guide</div>
      <a class="nav__link" href="index.html">← Guide</a>
      <a class="nav__link" href="analysis.html?id=1" style="margin-left:4px">📋 Analysis</a>
    </div>
  </nav>

  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading season dashboard…</p>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      🏉 <strong>NRLBettingGuide</strong> — Educational purposes only. Always gamble responsibly. 18+
      &nbsp;·&nbsp; <a href="index.html">Main Guide</a>
    </div>
  </footer>

  <script src="src/teamData.js?v=23"></script>
  <script>
  (async function() {

    const [formRes, resultsRes, statsRes] = await Promise.allSettled([
      fetch(`src/form-data.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/results-history.json?v=${Date.now()}`).then(r => r.json()),
      fetch('src/player-stats.json').then(r => r.json()),
    ]);

    const formData    = formRes.status    === 'fulfilled' ? formRes.value    : null;
    const resultsData = resultsRes.status === 'fulfilled' ? resultsRes.value : null;
    const statsData   = statsRes.status   === 'fulfilled' ? statsRes.value   : null;

    const ladder  = formData?.ladder  || [];
    const round   = formData?.round   || '—';
    const season  = resultsData?.season || 2026;
    const rounds  = resultsData?.rounds || [];

    // ── Summary stats ────────────────────────────────────────────────────────
    const [sW, sL] = (resultsData?.totalFavRecord || '0-0').split('-').map(Number);
    const sTotal   = sW + sL;
    const sPct     = sTotal ? Math.round((sW / sTotal) * 100) : 0;
    const sPctCls  = sPct >= 60 ? 'green' : sPct >= 50 ? 'amber' : 'red';

    // Best and worst fav round
    let bestRound = null, worstRound = null;
    rounds.forEach(r => {
      const [w, l] = (r.favRecord || '0-0').split('-').map(Number);
      const p = (w + l) ? w / (w + l) : 0;
      if (!bestRound  || p > bestRound.pct)  bestRound  = { round: r.round, rec: r.favRecord, pct: p };
      if (!worstRound || p < worstRound.pct) worstRound = { round: r.round, rec: r.favRecord, pct: p };
    });

    // Avg points scored/conceded per team
    const avgFor  = ladder.length ? (ladder.reduce((a, t) => a + t.ptsFor, 0) / ladder.length / (ladder[0]?.played || 1)).toFixed(1) : '—';
    const avgAgainst = ladder.length ? (ladder.reduce((a, t) => a + t.ptsAgainst, 0) / ladder.length / (ladder[0]?.played || 1)).toFixed(1) : '—';

    // ── Fav record bar chart ─────────────────────────────────────────────────
    function pillCls(pct) { return pct >= 60 ? 'pill-good' : pct >= 50 ? 'pill-mid' : 'pill-bad'; }
    function barCls(pct)  { return pct >= 60 ? 'good' : pct >= 50 ? 'mid' : 'bad'; }

    const favChartHtml = rounds.map(r => {
      const [w, l] = (r.favRecord || '0-0').split('-').map(Number);
      const total = w + l;
      const pct = total ? Math.round((w / total) * 100) : 0;
      const pctW = pct + '%';
      return `
      <div class="fav-row">
        <div class="fav-round">R${r.round}</div>
        <div class="fav-bar-wrap"><div class="fav-bar ${barCls(pct)}" style="width:${pctW}"></div></div>
        <div class="fav-record">${r.favRecord}</div>
        <div class="fav-pct">${pct}%</div>
        <span class="record-pill ${pillCls(pct)}">${pct >= 60 ? '✅' : pct >= 50 ? '➡️' : '⚠️'}</span>
      </div>`;
    }).join('');

    const [stW, stL] = (resultsData?.totalFavRecord || '0-0').split('-').map(Number);
    const stTotal = stW + stL;
    const stPct = stTotal ? Math.round((stW / stTotal) * 100) : 0;
    const seasonTotalHtml = `
      <div class="season-total-row">
        <div class="season-total-label">Total</div>
        <div class="fav-bar-wrap"><div class="fav-bar ${barCls(stPct)}" style="width:${stPct}%"></div></div>
        <div class="fav-record">${resultsData?.totalFavRecord || '—'}</div>
        <div class="fav-pct">${stPct}%</div>
        <span class="record-pill ${pillCls(stPct)}">${stPct}%</span>
      </div>`;

    // ── Round results table ──────────────────────────────────────────────────
    function roundTableHtml() {
      if (!rounds.length) return '<p style="color:var(--text-2);font-size:0.85rem">No completed rounds yet.</p>';
      return `
      <table class="round-table">
        <thead><tr>
          <th>Round</th>
          <th>Fav</th>
          <th>O/U</th>
          <th>Game Details</th>
        </tr></thead>
        <tbody>
          ${rounds.slice().reverse().map(r => {
            const [w, l] = (r.favRecord || '0-0').split('-').map(Number);
            const total  = w + l;
            const pct    = total ? Math.round((w / total) * 100) : 0;
            const gamesHtml = (r.games || []).map(g => {
              const icon = g.favouriteWon ? '✅' : '❌';
              const favShort = (g.favourite || '').split(' ').pop();
              const ouIcon = g.ouResult ? (g.ouResult === 'Over' ? '📈' : '📉') : '';
              return `<div class="game-result">
                <span class="fav-icon ${g.favouriteWon ? 'fav-win' : 'fav-loss'}">${icon}</span>
                <span class="result-score">${g.homeTeam.split(' ').pop()} ${g.homeScore}–${g.awayScore} ${g.awayTeam.split(' ').pop()}</span>
                <span style="font-size:0.7rem;color:var(--text-2)">fav: ${favShort}${g.ouResult ? ` · ${ouIcon}${g.ouResult} ${g.ouTotal}` : ''}</span>
              </div>`;
            }).join('');
            return `<tr>
              <td class="round-num">R${r.round}</td>
              <td><span class="record-pill ${pillCls(pct)}">${r.favRecord} (${pct}%)</span></td>
              <td style="font-size:0.78rem;color:var(--text-2)">${r.ouRecord ?? '—'}</td>
              <td>${gamesHtml}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    }

    // ── Ladder table ─────────────────────────────────────────────────────────
    function ladderHtml() {
      if (!ladder.length) return '<p style="color:var(--text-2);font-size:0.85rem">Ladder unavailable.</p>';
      return `
      <table class="ladder-table">
        <thead><tr>
          <th>#</th><th>Team</th>
          <th>P</th><th>W</th><th>L</th>
          <th>F</th><th>A</th><th>Diff</th>
          <th>Pts</th><th>Streak</th>
        </tr></thead>
        <tbody>
          ${ladder.map(row => {
            const zoneClass = row.pos <= 4 ? 'top4' : row.pos <= 8 ? 'top8' : 'out';
            const cutoff    = row.pos === 8 ? 'cutoff' : '';
            const diffStr   = row.diff >= 0 ? `+${row.diff}` : `${row.diff}`;
            const diffClass = row.diff >= 0 ? 'l-diff-pos' : 'l-diff-neg';
            const streakCls = row.streak.includes('W') ? 'l-streak-w' : 'l-streak-l';
            const avgFor    = row.played ? (row.ptsFor / row.played).toFixed(1) : '—';
            const avgAg     = row.played ? (row.ptsAgainst / row.played).toFixed(1) : '—';
            return `<tr class="${zoneClass} ${cutoff}">
              <td class="l-pos">${row.pos}</td>
              <td class="l-team"><span>${row.nick}</span><span class="l-nick">${row.name.replace(row.nick, '').trim()}</span></td>
              <td>${row.played}</td>
              <td style="font-weight:600;color:var(--green)">${row.wins}</td>
              <td style="color:#f85149">${row.losses}</td>
              <td class="l-avg">${avgFor}</td>
              <td class="l-avg">${avgAg}</td>
              <td class="${diffClass}">${diffStr}</td>
              <td class="l-pts">${row.pts}</td>
              <td class="${streakCls}">${row.streak}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2);display:flex;gap:16px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--green);margin-right:4px"></span>Top 4</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f0a500;margin-right:4px"></span>Top 8 (Finals)</span>
        <span>F/A = avg points for/against per game</span>
        <span>📡 NRL.com after Round ${round}</span>
      </div>`;
    }

    // ── Scoring leaders (from player-stats) ─────────────────────────────────
    function scoringLeadersHtml() {
      const players = statsData?.players;
      if (!players) return '<p style="color:var(--text-2);font-size:0.85rem">Player stats unavailable.</p>';

      const list = Object.entries(players)
        .filter(([, p]) => p.games >= 3 && p.tries >= 1)
        .sort((a, b) => b[1].tries - a[1].tries || b[1].tryRate - a[1].tryRate);

      const top20 = list.slice(0, 20);
      const mid = Math.ceil(top20.length / 2);
      const left = top20.slice(0, mid);
      const right = top20.slice(mid);

      const rows = (chunk, offset) => chunk.map(([name, p], i) => {
        const rank = offset + i + 1;
        const rateCls = p.tryRate >= 0.8 ? 'high' : p.tryRate <= 0.35 ? 'low' : '';
        const teamShort = (p.team || '').split(' ').pop();
        return `<div class="trend-row">
          <div class="trend-rank">${rank}</div>
          <div class="trend-name">
            <div style="font-weight:600">${name}</div>
            <div style="font-size:0.68rem;color:var(--text-2)">${teamShort} · ${p.games}G</div>
          </div>
          <div style="text-align:right">
            <div class="trend-val ${rateCls}">${p.tries}</div>
            <div style="font-size:0.65rem;color:var(--text-2)">${(p.tryRate * 100).toFixed(0)}%/g</div>
          </div>
        </div>`;
      }).join('');

      return `
        <div class="trend-grid">
          <div>
            <div class="trend-team-label">Top try scorers (1–${mid})</div>
            ${rows(left, 0)}
          </div>
          <div>
            <div class="trend-team-label">Top try scorers (${mid + 1}–${top20.length})</div>
            ${rows(right, mid)}
          </div>
        </div>
        <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2)">
          📡 NRL.com match timelines — tries from all completed rounds · min 3 games
        </div>`;
    }

    // ── Team attack vs defence rankings ─────────────────────────────────────
    function teamRankingsHtml() {
      if (!ladder.length) return '';
      const byAttack  = [...ladder].sort((a, b) => b.ptsFor  - a.ptsFor);
      const byDefence = [...ladder].sort((a, b) => a.ptsAgainst - b.ptsAgainst);

      const col = (teams, label, key, order) => {
        return `<div>
          <div class="trend-team-label">${label}</div>
          ${teams.slice(0, 8).map((t, i) => {
            const val = order === 'asc' ? t.ptsAgainst : t.ptsFor;
            const avg = t.played ? (val / t.played).toFixed(1) : '—';
            const cls = i < 3 ? (order === 'asc' ? 'high' : 'high') : '';
            return `<div class="trend-row">
              <div class="trend-rank">${i + 1}</div>
              <div class="trend-name">${t.nick}</div>
              <div class="trend-val ${cls}">${avg}</div>
            </div>`;
          }).join('')}
        </div>`;
      };

      return `
        <div class="trend-grid">
          ${col(byAttack,  '🏆 Attack (avg pts scored)',   'ptsFor',     'desc')}
          ${col(byDefence, '🛡️ Defence (avg pts conceded)', 'ptsAgainst', 'asc')}
        </div>
        <div style="margin-top:10px;font-size:0.7rem;color:var(--text-2)">Per game average · after Round ${round}</div>`;
    }

    // ── Helper: get all games flat ───────────────────────────────────────────
    const allGames = rounds.flatMap(r => (r.games || []).map(g => ({ ...g, roundNum: r.round })));

    // ── 1. Current Ladder (with logos) ───────────────────────────────────────
    function newLadderHtml() {
      if (!ladder.length) return '<p style="color:var(--text-2);font-size:0.85rem">Ladder unavailable.</p>';
      const teamData = (typeof NRL_TEAM_DATA !== 'undefined') ? NRL_TEAM_DATA : {};
      return `
      <table class="new-ladder-table">
        <thead><tr>
          <th>#</th><th>Team</th>
          <th>P</th><th>W</th><th>L</th>
          <th>Diff</th><th>Pts</th><th>Streak</th>
        </tr></thead>
        <tbody>
          ${ladder.map(row => {
            const zoneClass = row.pos <= 4 ? 'top4' : row.pos <= 8 ? 'top8' : 'out';
            const cutoff    = row.pos === 8 ? 'cutoff' : '';
            const diffStr   = row.diff >= 0 ? `+${row.diff}` : `${row.diff}`;
            const diffCls   = row.diff >= 0 ? 'l-diff-pos' : 'l-diff-neg';
            const streakCls = row.streak.includes('W') ? 'l-streak-w' : 'l-streak-l';
            const td        = teamData[row.name] || {};
            const logoFile  = td.logoFile;
            const logoHtml  = logoFile ? `<img class="nl-logo" src="src/logos/${logoFile}" alt="${row.nick}" onerror="this.style.display='none'">` : '';
            return `<tr class="${zoneClass} ${cutoff}">
              <td class="l-pos">${row.pos}</td>
              <td>
                <div class="nl-team-cell">
                  ${logoHtml}
                  <div>
                    <div class="nl-name">${row.nick}</div>
                    <div class="nl-nick">${row.name.replace(row.nick, '').trim()}</div>
                  </div>
                </div>
              </td>
              <td>${row.played}</td>
              <td style="font-weight:600;color:var(--green)">${row.wins}</td>
              <td style="color:#f85149">${row.losses}</td>
              <td class="${diffCls}">${diffStr}</td>
              <td class="l-pts">${row.pts}</td>
              <td class="${streakCls}">${row.streak}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2);display:flex;gap:16px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--green);margin-right:4px"></span>Top 4 — Finals hosts</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f0a500;margin-right:4px"></span>Top 8 — Finals</span>
        <span>📡 NRL.com after Round ${round}</span>
      </div>`;
    }

    // ── 2. O/U by Round (visual bars) ────────────────────────────────────────
    function ouByRoundHtml() {
      const ouRounds = rounds.filter(r => (r.games || []).some(g => g.ouResult));
      if (!ouRounds.length) return '<p style="color:var(--text-2);font-size:0.85rem">No O/U data available yet.</p>';

      let totalOver = 0, totalUnder = 0;
      const maxGames = Math.max(...ouRounds.map(r => {
        const o = r.games.filter(g => g.ouResult === 'Over').length;
        const u = r.games.filter(g => g.ouResult === 'Under').length;
        return o + u;
      }));

      const rowsHtml = ouRounds.map(r => {
        const over  = r.games.filter(g => g.ouResult === 'Over').length;
        const under = r.games.filter(g => g.ouResult === 'Under').length;
        totalOver  += over;
        totalUnder += under;
        const total = over + under;
        const overPct  = total ? Math.round((over  / maxGames) * 100) : 0;
        const underPct = total ? Math.round((under / maxGames) * 100) : 0;
        return `
        <div class="ou-row">
          <div class="ou-round-label">R${r.round}</div>
          <div class="ou-bars">
            <div class="ou-bar-row">
              <div class="ou-bar-label" style="color:var(--green);font-size:0.65rem;font-weight:700">OVER</div>
              <div class="ou-bar-track"><div class="ou-bar-fill over" style="width:${overPct}%"></div></div>
              <div class="ou-bar-count over">${over}</div>
            </div>
            <div class="ou-bar-row">
              <div class="ou-bar-label" style="color:#f85149;font-size:0.65rem;font-weight:700">UNDER</div>
              <div class="ou-bar-track"><div class="ou-bar-fill under" style="width:${underPct}%"></div></div>
              <div class="ou-bar-count under">${under}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      const grandTotal = totalOver + totalUnder;
      const overPctSeason  = grandTotal ? Math.round(totalOver  / grandTotal * 100) : 0;
      const underPctSeason = grandTotal ? Math.round(totalUnder / grandTotal * 100) : 0;

      return `
      <div class="ou-chart">
        ${rowsHtml}
        <div class="ou-total-row">
          <div class="ou-total-label">Total</div>
          <div class="ou-pills">
            <span class="ou-pill-over">Over ${totalOver} (${overPctSeason}%)</span>
            <span class="ou-pill-under">Under ${totalUnder} (${underPctSeason}%)</span>
            <span style="font-size:0.72rem;color:var(--text-2)">${grandTotal} games with O/U data</span>
          </div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2)">O/U data available from rounds where opening odds were sourced (Rounds 11+)</div>`;
    }

    // ── 3. Biggest Upsets ────────────────────────────────────────────────────
    function biggestUpsetsHtml() {
      const upsets = allGames
        .filter(g => !g.favouriteWon)
        .sort((a, b) => b.margin - a.margin)
        .slice(0, 8);
      if (!upsets.length) return '<p style="color:var(--text-2);font-size:0.85rem">No upsets recorded yet.</p>';
      return `
      <table class="upsets-table">
        <thead><tr>
          <th>#</th><th>Round</th><th>Result</th><th>Favourite</th><th style="text-align:right">Margin</th>
        </tr></thead>
        <tbody>
          ${upsets.map((g, i) => {
            const favWasHome = g.favourite === g.homeTeam;
            const winner     = favWasHome ? g.awayTeam : g.homeTeam;
            const winnerNick = winner.split(' ').pop();
            const favNick    = g.favourite.split(' ').pop();
            const scoreStr   = `${g.homeScore}–${g.awayScore}`;
            return `<tr>
              <td class="upsets-rank">${i + 1}</td>
              <td><span class="round-num">R${g.roundNum}</span></td>
              <td>
                <div style="font-size:0.8rem">${g.homeTeam.split(' ').pop()} <strong>${g.homeScore}–${g.awayScore}</strong> ${g.awayTeam.split(' ').pop()}</div>
                <div class="upsets-winner">↑ ${winnerNick} wins</div>
              </td>
              <td><span class="upsets-fav">Fav: ${favNick}${g.linePoint ? ` (${g.linePoint > 0 ? '+' : ''}${g.linePoint})` : ''}</span></td>
              <td class="upsets-margin">−${g.margin}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="margin-top:10px;font-size:0.7rem;color:var(--text-2)">Sorted by winning margin of the upset. Negative margin = favourite lost by that many points.</div>`;
    }

    // ── 4. Team Form Table ────────────────────────────────────────────────────
    function teamFormTableHtml() {
      const teamsObj = formData?.teams || {};
      const teamNames = Object.keys(teamsObj);
      if (!teamNames.length) return '<p style="color:var(--text-2);font-size:0.85rem">Form data unavailable.</p>';
      const cells = teamNames.map(name => {
        const t = teamsObj[name];
        const results = (t.last5 || '').split(' ').filter(Boolean);
        const pills = results.map(r => {
          const cls = r === 'W' ? 'form-pill-w' : r === 'L' ? 'form-pill-l' : 'form-pill-d';
          return `<span class="form-pill ${cls}">${r}</span>`;
        }).join('');
        const nick = name.split(' ').pop();
        return `<div class="form-cell">
          <div class="form-team-name">${nick}</div>
          <div class="form-pills">${pills}</div>
        </div>`;
      });
      return `<div class="form-grid">${cells.join('')}</div>
      <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2)">Last 5 results (oldest → newest). W = win, L = loss.</div>`;
    }

    // ── 5. Fav Reliability ───────────────────────────────────────────────────
    function favReliabilityHtml() {
      const teamRec = {};
      allGames.forEach(g => {
        if (!g.favourite) return;
        if (!teamRec[g.favourite]) teamRec[g.favourite] = { w: 0, l: 0 };
        g.favouriteWon ? teamRec[g.favourite].w++ : teamRec[g.favourite].l++;
      });
      const qualified = Object.entries(teamRec)
        .filter(([, r]) => r.w + r.l >= 3)
        .map(([name, r]) => ({ name, w: r.w, l: r.l, total: r.w + r.l, pct: Math.round(r.w / (r.w + r.l) * 100) }))
        .sort((a, b) => b.pct - a.pct || b.total - a.total);

      if (!qualified.length) return '<p style="color:var(--text-2);font-size:0.85rem">Not enough data yet.</p>';

      const top5    = qualified.slice(0, 5);
      const bottom5 = qualified.slice(-5).reverse();

      const renderList = (list, cls) => list.map((t, i) => {
        const nick = t.name.split(' ').pop();
        return `<div class="rel-row">
          <div class="rel-rank">${i + 1}</div>
          <div class="rel-name">${nick}</div>
          <div class="rel-record">${t.w}–${t.l}</div>
          <div class="rel-bar-wrap"><div class="rel-bar ${cls}" style="width:${t.pct}%"></div></div>
          <div class="rel-pct ${cls}">${t.pct}%</div>
        </div>`;
      }).join('');

      return `
      <div class="rel-grid">
        <div>
          <div class="rel-section-label">Most reliable favourites</div>
          <div class="rel-list">${renderList(top5, 'good')}</div>
        </div>
        <div>
          <div class="rel-section-label">Least reliable favourites</div>
          <div class="rel-list">${renderList(bottom5, 'bad')}</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2)">Teams with min 3 games as favourite. Win % when priced as the market favourite.</div>`;
    }

    // ── 6. Season Scoring Records ────────────────────────────────────────────
    function scoringRecordsHtml() {
      if (!allGames.length) return '<p style="color:var(--text-2);font-size:0.85rem">No game data yet.</p>';

      const withTotal = allGames.map(g => ({ ...g, total: g.homeScore + g.awayScore }));
      const highGame  = [...withTotal].sort((a, b) => b.total - a.total)[0];
      const lowGame   = [...withTotal].sort((a, b) => a.total - b.total)[0];
      const bigMargin = [...allGames].sort((a, b) => b.margin - a.margin)[0];

      // Most one-sided round (avg margin)
      const roundMargins = {};
      rounds.forEach(r => {
        if (!r.games?.length) return;
        roundMargins[r.round] = r.games.reduce((s, g) => s + g.margin, 0) / r.games.length;
      });
      const mostOnesidedRound = Object.entries(roundMargins).sort((a, b) => b[1] - a[1])[0];

      const fmtGame = g => `${g.homeTeam.split(' ').pop()} ${g.homeScore}–${g.awayScore} ${g.awayTeam.split(' ').pop()} (R${g.roundNum})`;

      return `
      <div class="records-grid">
        <div class="record-card">
          <div class="record-card-label">Highest scoring game</div>
          <div class="record-card-val green">${highGame.total} pts</div>
          <div class="record-card-detail">${fmtGame(highGame)}</div>
        </div>
        <div class="record-card">
          <div class="record-card-label">Lowest scoring game</div>
          <div class="record-card-val red">${lowGame.total} pts</div>
          <div class="record-card-detail">${fmtGame(lowGame)}</div>
        </div>
        <div class="record-card">
          <div class="record-card-label">Biggest winning margin</div>
          <div class="record-card-val amber">${bigMargin.margin} pts</div>
          <div class="record-card-detail">${fmtGame(bigMargin)}</div>
        </div>
        <div class="record-card">
          <div class="record-card-label">Most one-sided round</div>
          <div class="record-card-val">${mostOnesidedRound ? `R${mostOnesidedRound[0]}` : '—'}</div>
          <div class="record-card-detail">${mostOnesidedRound ? `Avg margin: ${mostOnesidedRound[1].toFixed(1)} pts` : '—'}</div>
        </div>
      </div>`;
    }

    // ── 7. Best Value Wins ───────────────────────────────────────────────────
    function bestValueWinsHtml() {
      // Heavy favourite upsets: favouriteWon=false AND linePoint <= -7.5 (big spread = short-priced fav)
      const heavyFavUpsets = allGames
        .filter(g => !g.favouriteWon && g.linePoint !== null && g.linePoint <= -7.5)
        .sort((a, b) => a.linePoint - b.linePoint); // most negative = heaviest fav first

      if (!heavyFavUpsets.length) {
        // Fallback: show biggest upsets where oddsSourced=true
        const sourcedUpsets = allGames
          .filter(g => !g.favouriteWon && g.oddsSourced)
          .sort((a, b) => b.margin - a.margin)
          .slice(0, 5);
        if (!sourcedUpsets.length) return `<p style="color:var(--text-2);font-size:0.85rem">No heavy favourite upset data yet — needs more rounds with odds sourced.</p>`;
        return renderValueTable(sourcedUpsets, true);
      }
      return renderValueTable(heavyFavUpsets.slice(0, 5), false);
    }

    function renderValueTable(list, isFallback) {
      const rows = list.map((g, i) => {
        const winner  = g.favouriteWon ? g.favourite : (g.favourite === g.homeTeam ? g.awayTeam : g.homeTeam);
        const winNick = winner.split(' ').pop();
        const favNick = g.favourite.split(' ').pop();
        const spreadLabel = g.linePoint ? `Spread: ${g.linePoint > 0 ? '+' : ''}${g.linePoint}` : 'Odds sourced';
        return `<tr>
          <td class="upsets-rank">${i + 1}</td>
          <td><span class="round-num">R${g.roundNum}</span></td>
          <td>
            <div style="font-size:0.8rem">${g.homeTeam.split(' ').pop()} <strong>${g.homeScore}–${g.awayScore}</strong> ${g.awayTeam.split(' ').pop()}</div>
            <div class="upsets-winner">↑ ${winNick} (underdog)</div>
          </td>
          <td><span class="upsets-fav">Fav: ${favNick}</span><br><span class="value-badge">${spreadLabel}</span></td>
          <td class="upsets-margin">${g.margin} pts</td>
        </tr>`;
      }).join('');

      return `
      <table class="value-table">
        <thead><tr>
          <th>#</th><th>Round</th><th>Result</th><th>Fav / Spread</th><th style="text-align:right">Margin</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="margin-top:10px;font-size:0.7rem;color:var(--text-2)">
        ${isFallback
          ? 'Showing all upset results from rounds where opening odds were sourced. More data available as the season progresses.'
          : 'Heavy favourite upsets — favourite had a line spread of −7.5 or greater (implied heavy favourite). Margin = how much the favourite lost by.'}
      </div>`;
    }

    // ── Render ───────────────────────────────────────────────────────────────
    document.getElementById('app').innerHTML = `

    <!-- HERO -->
    <div class="hero">
      <div class="container">
        <div class="hero-title">📊 <span>${season}</span> Season Dashboard</div>
        <div class="hero-sub">NRL Premiership — through Round ${round} &nbsp;·&nbsp; Favourite tracking &amp; full ladder</div>
      </div>
    </div>

    <!-- STAT CARDS -->
    <div class="container">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-card-label">Season fav record</div>
          <div class="stat-card-val ${sPctCls}">${sW}–${sL}</div>
          <div class="stat-card-sub">${sPct}% win rate (${sTotal} games)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Best round</div>
          <div class="stat-card-val green">${bestRound ? bestRound.rec : '—'}</div>
          <div class="stat-card-sub">${bestRound ? `Round ${bestRound.round} (${Math.round(bestRound.pct * 100)}%)` : '—'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Toughest round</div>
          <div class="stat-card-val red">${worstRound ? worstRound.rec : '—'}</div>
          <div class="stat-card-sub">${worstRound ? `Round ${worstRound.round} (${Math.round(worstRound.pct * 100)}%)` : '—'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">O/U record (odds data)</div>
          <div class="stat-card-val">${resultsData?.totalOuRecord ?? '—'}</div>
          <div class="stat-card-sub">${resultsData?.totalOuRecord ? 'from rounds with opening odds' : 'available from Round 11+'}</div>
        </div>
      </div>
    </div>

    <!-- MAIN SECTIONS -->
    <div class="container sections">

      <!-- FAVOURITE TRACKING -->
      <div>
        <div class="section-title">✅ Favourite Win Rate by Round</div>
        <div class="card">
          <div class="card-label">Round-by-round — did the favourite win?</div>
          <div class="fav-chart">
            ${favChartHtml || '<p style="color:var(--text-2)">No data yet.</p>'}
            ${seasonTotalHtml}
          </div>
          <div style="margin-top:14px;font-size:0.7rem;color:var(--text-2)">
            ✅ ≥60% &nbsp;·&nbsp; ➡️ 50–59% &nbsp;·&nbsp; ⚠️ &lt;50% &nbsp;·&nbsp;
            Favourite sourced from opening odds where available, otherwise from NRL ladder position
          </div>
        </div>
      </div>

      <!-- ROUND RESULTS DETAIL -->
      <div>
        <div class="section-title">📋 Round Results Detail</div>
        <div class="card">
          <div class="card-label">Game-by-game results — most recent first</div>
          ${roundTableHtml()}
        </div>
      </div>

      <!-- FULL LADDER -->
      <div>
        <div class="section-title">🏆 2026 Ladder</div>
        <div class="card">
          <div class="card-label">NRL premiership standings — Round ${round}</div>
          ${ladderHtml()}
        </div>
      </div>

      <!-- TEAM RANKINGS -->
      <div>
        <div class="section-title">⚡ Team Attack &amp; Defence Rankings</div>
        <div class="card">
          <div class="card-label">Average points scored vs conceded per game</div>
          ${teamRankingsHtml()}
        </div>
      </div>

      <!-- TRY SCORING LEADERS -->
      <div>
        <div class="section-title">🏉 Try Scoring Leaders</div>
        <div class="card">
          <div class="card-label">Season try totals &amp; per-game rate — all players</div>
          ${scoringLeadersHtml()}
        </div>
      </div>

      <!-- ══ NEW SECTIONS ══════════════════════════════════════════════════ -->

      <!-- 1. CURRENT LADDER (with logos) -->
      <div class="season-section">
        <div class="season-section-title">🏆 Current Ladder</div>
        <div class="card">
          <div class="card-label">NRL premiership standings — Round ${round}</div>
          ${newLadderHtml()}
        </div>
      </div>

      <!-- 2. O/U BY ROUND -->
      <div class="season-section">
        <div class="season-section-title">📊 Over/Under Results by Round</div>
        <div class="card">
          <div class="card-label">Games going Over vs Under the total — rounds with odds data</div>
          ${ouByRoundHtml()}
        </div>
      </div>

      <!-- 3. BIGGEST UPSETS -->
      <div class="season-section">
        <div class="season-section-title">💥 Biggest Upsets</div>
        <div class="card">
          <div class="card-label">Largest margins where the favourite lost — Top 8 of ${season}</div>
          ${biggestUpsetsHtml()}
        </div>
      </div>

      <!-- 4. TEAM FORM TABLE -->
      <div class="season-section">
        <div class="season-section-title">📈 Team Form — Last 5 Results</div>
        <div class="card">
          <div class="card-label">All 17 teams — most recent 5 games</div>
          ${teamFormTableHtml()}
        </div>
      </div>

      <!-- 5. FAV RELIABILITY -->
      <div class="season-section">
        <div class="season-section-title">🎯 Favourite Reliability by Team</div>
        <div class="card">
          <div class="card-label">Win rate when priced as the favourite — min 3 games</div>
          ${favReliabilityHtml()}
        </div>
      </div>

      <!-- 6. SEASON SCORING RECORDS -->
      <div class="season-section">
        <div class="season-section-title">🔢 Season Scoring Records</div>
        <div class="card">
          <div class="card-label">Highest/lowest totals &amp; biggest margins of ${season}</div>
          ${scoringRecordsHtml()}
        </div>
      </div>

      <!-- 7. BEST VALUE WINS -->
      <div class="season-section">
        <div class="season-section-title">💰 Best Value Wins</div>
        <div class="card">
          <div class="card-label">Underdogs beating heavy favourites — biggest spread upsets</div>
          ${bestValueWinsHtml()}
        </div>
      </div>

    </div><!-- /sections -->
    `;

  })();
  </script>
</body>
</html>
