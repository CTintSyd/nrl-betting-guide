name: Update NRL Data

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2am UTC = 12pm AEST (catches post-round updates)
    - cron: '0 10 * * 4'  # Extra run Thursdays at 10am UTC = 8pm AEST (team list night)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update player stats (NRL.com match timelines)
        run: python3 scripts/update-player-stats.py

      - name: Update team rosters from player stats
        run: python3 scripts/update-team-data-players.py

      - name: Update form strings + ladder (NRL.com)
        run: python3 scripts/update-form.py

      - name: Update team lists + injury report (NRL.com Casualty Ward)
        run: python3 scripts/update-team-lists.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/player-stats.json src/teamData.js src/form-data.json src/team-lists.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update NRL data $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push
          )
