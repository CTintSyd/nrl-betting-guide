name: Update NRL Data

on:
  schedule:
    # ── Non-game days: once daily at 2am UTC (12pm AEST) ──────────────────────
    - cron: '0 2 * * 2,3'    # Tue & Wed — quiet days, one refresh is enough

    # ── Thursday: daily run + evening team-list announcement ──────────────────
    - cron: '0 2  * * 4'     # Thu 12pm AEST — daytime refresh
    - cron: '0 10 * * 4'     # Thu 8pm AEST  — team lists announced this evening

    # ── Game days: every 30 min across the window games are played ───────────
    # NRL games typically run 3pm–10pm AEST (5am–12pm UTC) Fri/Sat/Sun.
    # Running every 30min captures results within ~30min of each game finishing.
    - cron: '0,15,30,45 4-12 * * 5'    # Friday   (2pm–10pm AEST)
    - cron: '0,15,30,45 4-12 * * 6'    # Saturday (2pm–10pm AEST)
    - cron: '0,15,30,45 4-12 * * 0'    # Sunday   (2pm–10pm AEST)
    - cron: '0 4,6,8,10,12 * * 1'    # Monday   (every 2h — occasional games only)

  workflow_dispatch:        # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update player stats (NRL.com match timelines)
        run: python3 scripts/update-player-stats.py

      - name: Update team rosters from player stats
        run: python3 scripts/update-team-data-players.py

      - name: Update form strings + ladder (NRL.com)
        run: python3 scripts/update-form.py

      - name: Update team lists + injury report (NRL.com Casualty Ward)
        run: python3 scripts/update-team-lists.py

      - name: Fetch H2H records (NRL.com match centre)
        run: python3 scripts/fetch-h2h.py

      - name: Fetch Zero Tackle articles (RSS)
        run: python3 scripts/fetch-zerotackle.py

      - name: Update results history (favourite win/loss record)
        run: python3 scripts/update-results.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/player-stats.json src/teamData.js src/form-data.json src/team-lists.json src/zerotackle-articles.json src/h2h-data.json src/results-history.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update NRL data $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push
          )
