<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Analysis — NRL Betting Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00a651; --green-dark: #007a3c;
      --dark: #0d1117; --dark-2: #161b22; --dark-3: #21262d;
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3; --text-2: #8b949e;
      --radius: 12px; --radius-sm: 8px;
      --font: 'Inter', system-ui, sans-serif;
      --font-heading: 'Barlow Condensed', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--dark); color: var(--text); line-height: 1.6; font-size: 15px; }
    a { color: var(--green); text-decoration: none; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

    /* ── Nav ── */
    .nav { background: rgba(13,17,23,0.97); border-bottom: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
    .nav__inner { display: flex; align-items: center; gap: 16px; }
    .nav__logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.05rem; color: #fff; }
    .nav__logo span { color: var(--green); }
    .nav__back { margin-left: auto; background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--text-2); padding: 7px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .nav__back:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── Hero ── */
    .hero { background: var(--dark-2); border-bottom: 1px solid var(--border); padding: 40px 0 32px; }
    .match-header { display: flex; align-items: center; justify-content: center; gap: 32px; margin-bottom: 24px; }
    .match-team { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; max-width: 200px; }
    .match-logo { width: 90px; height: 90px; object-fit: contain; }
    .match-logo-placeholder { width: 90px; height: 90px; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; }
    .match-team-name { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 800; text-align: center; color: #fff; }
    .match-team-meta { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .match-ladder-pos { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 4px; }
    .match-ha { font-size: 0.66rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
    .match-ha--home { background: rgba(0,166,81,0.18); color: #00a651; }
    .match-ha--away { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }
    .match-vs-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .match-vs { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; color: var(--text-2); }
    .match-badge { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 100px; }
    .badge-upcoming { background: rgba(255,255,255,0.07); color: var(--text-2); }
    .badge-live { background: rgba(220,50,50,0.2); color: #f85149; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .match-meta { text-align: center; color: var(--text-2); font-size: 0.85rem; }
    .match-meta strong { color: var(--text); }

    /* ── Grid Layout ── */
    .page-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 28px 0; }
    .section-title { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 800; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* ── Cards ── */
    .card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--green); margin-bottom: 14px; }

    /* ── Probability Bars ── */
    .prob-matchup { margin-bottom: 20px; }
    .prob-matchup-label { font-size: 0.8rem; color: var(--text-2); margin-bottom: 8px; }
    .prob-bar-row { display: flex; align-items: center; gap: 10px; }
    .prob-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 100px; height: 10px; overflow: hidden; }
    .prob-bar { height: 100%; border-radius: 100px; background: var(--green); transition: width 0.6s ease; }
    .prob-bar.away { background: #58a6ff; }
    .prob-val { font-size: 0.82rem; font-weight: 700; width: 40px; text-align: right; }
    .prob-team { font-size: 0.78rem; color: var(--text-2); width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prob-team.right { text-align: right; }

    /* ── Odds Table ── */
    .odds-table { width: 100%; border-collapse: collapse; }
    .odds-table th { font-size: 0.72rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .odds-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.88rem; }
    .odds-table tr:last-child td { border-bottom: none; }
    .odds-table .odd-val { font-weight: 700; color: var(--green); font-family: var(--font-heading); font-size: 1.05rem; }
    .odds-table .impl { font-size: 0.76rem; color: var(--text-2); }
    .odds-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; vertical-align: middle; margin-left: 6px; }
    .badge-fav { background: rgba(0,166,81,0.2); color: var(--green); }
    .badge-dog { background: rgba(88,166,255,0.15); color: #58a6ff; }

    /* ── Form Guide ── */
    .form-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .form-team-name { font-size: 0.85rem; font-weight: 600; color: var(--text); width: 110px; }
    .form-badges { display: flex; gap: 5px; }
    .form-badge { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 800; }
    .form-w { background: rgba(0,166,81,0.2); color: var(--green); }
    .form-l { background: rgba(248,81,73,0.2); color: #f85149; }
    .form-d { background: rgba(255,255,255,0.08); color: var(--text-2); }

    /* ── Key Facts ── */
    .fact-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px; }
    .fact-row:last-child { border-bottom: none; }
    .fact-label { font-size: 0.82rem; color: var(--text-2); flex-shrink: 0; }
    .fact-val { font-size: 0.85rem; font-weight: 600; color: var(--text); text-align: right; }

    /* ── Recommendation Box ── */
    .rec-box { background: rgba(0,166,81,0.1); border: 1px solid rgba(0,166,81,0.25); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 14px; }
    .rec-box .rec-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
    .rec-box p { font-size: 0.88rem; color: var(--text); line-height: 1.5; }

    /* ── Player Picks ── */
    .player-picks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .player-pick-card { background: var(--dark-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .player-pick-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .player-pick-team { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); }
    .player-pick-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .player-pick-item:last-child { border-bottom: none; }
    .player-pick-name { font-size: 0.85rem; font-weight: 600; }
    .player-pick-pos { font-size: 0.72rem; color: var(--text-2); margin-top: 1px; }
    .player-odds { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .player-odds .fts { font-size: 0.72rem; color: #f0a500; }
    .player-odds .anytime { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; color: #f0a500; }


    /* ── Best Bets ── */
    .best-bets { display: flex; flex-direction: column; gap: 10px; }
    .best-bet-item { background: var(--dark-3); border-left: 3px solid var(--green); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 14px; }
    .best-bet-item.medium { border-color: #ffa500; }
    .best-bet-item.high { border-color: #f85149; }
    .best-bet-type { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-2); margin-bottom: 3px; }
    .best-bet-pick { font-size: 0.92rem; font-weight: 700; color: #fff; }
    .best-bet-odd { font-family: var(--font-heading); font-size: 1.05rem; color: var(--green); font-weight: 700; margin-top: 2px; }
    .best-bet-item.medium .best-bet-odd { color: #ffa500; }
    .best-bet-item.high .best-bet-odd { color: #f85149; }
    .best-bet-rationale { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; line-height: 1.4; }
    .odds-estimated-tag { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; background: rgba(255,165,0,0.15); color: #ffa500; border: 1px solid rgba(255,165,0,0.3); }
    .odds-live-tag { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; background: rgba(0,178,81,0.12); color: var(--green); border: 1px solid rgba(0,178,81,0.25); }

    /* ── Named Teams ── */
    .team-list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .team-list-col { }
    .team-list-col-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .team-list-player { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.82rem; }
    .team-list-player:last-child { border-bottom: none; }
    .player-num { width: 18px; font-weight: 700; color: var(--text-2); font-size: 0.73rem; flex-shrink: 0; text-align: right; }
    .player-name-cell { flex: 1; font-weight: 500; color: var(--text); }
    .player-pos-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.07); color: var(--text-2); white-space: nowrap; }
    .team-list-section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); opacity: 0.55; margin: 10px 0 4px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
    .team-list-pending { font-size: 0.82rem; color: var(--text-2); padding: 8px 0; }
    .team-list-source { font-size: 0.71rem; color: var(--text-2); margin-top: 12px; opacity: 0.7; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

    /* ── Injury Report (real data) ── */
    .injury-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .injury-col-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .injury-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .injury-item:last-child { border-bottom: none; }
    .inj-photo { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--dark-3); border: 1px solid var(--border); }
    .inj-photo-placeholder { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; background: var(--dark-3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .injury-info { flex: 1; min-width: 0; }
    .inj-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .injury-name { font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .injury-name a { color: inherit; }
    .injury-name a:hover { color: var(--green); }
    .inj-sev { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .sev-minor      { background: rgba(0,166,81,0.15); color: var(--green); }
    .sev-moderate   { background: rgba(255,165,0,0.18); color: #ffa500; }
    .sev-serious    { background: rgba(248,81,73,0.15); color: #f85149; }
    .sev-longterm   { background: rgba(248,81,73,0.1); color: #f85149; }
    .sev-suspended  { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .inj-pos { font-size: 0.71rem; color: var(--text-2); margin-top: 2px; }
    .inj-detail { margin-top: 5px; font-size: 0.76rem; color: var(--text-2); display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
    .inj-type-tag { font-weight: 600; color: var(--text); background: rgba(255,255,255,0.07); padding: 1px 6px; border-radius: 3px; font-size: 0.72rem; }
    .inj-return-text { color: var(--text-2); }
    .inj-return-rounds { font-weight: 600; color: var(--text); }
    .no-casualties { font-size: 0.82rem; color: var(--green); padding: 6px 0; }
    .injury-source { font-size: 0.71rem; color: var(--text-2); margin-top: 12px; opacity: 0.7; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

    /* ── H2H record ── */
    .h2h-summary { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; gap: 8px; text-align: center; }
    .h2h-team-block { flex: 1; }
    .h2h-team-name { font-size: 0.68rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .h2h-team-wins { font-size: 1.6rem; font-weight: 800; color: #fff; font-family: var(--font-heading); line-height: 1; }
    .h2h-team-wins.dominant { color: var(--green); }
    .h2h-mid { font-size: 0.72rem; color: var(--text-2); line-height: 1.5; }
    .h2h-played { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .h2h-matches { display: flex; flex-direction: column; gap: 0; }
    .h2h-match { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; gap: 8px; }
    .h2h-match:last-child { border-bottom: none; }
    .h2h-match-round { font-size: 0.68rem; color: var(--text-2); min-width: 64px; }
    .h2h-match-year { display: block; font-size: 0.6rem; color: var(--nrl-green, #00b251); opacity: 0.8; margin-top: 1px; }
    .h2h-match-teams { flex: 1; color: var(--text); font-weight: 500; }
    .h2h-match-score { font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .h2h-match-winner { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; background: rgba(0,166,81,0.15); color: var(--green); min-width: 52px; text-align: center; }
    .h2h-no-data { font-size: 0.82rem; color: var(--text-2); }
    .h2h-source-note { font-size: 0.68rem; color: var(--text-2); margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

    /* ── Named 17s ── */
    .named-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .named-team-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); margin-bottom: 10px; }
    .named-player { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
    .named-player:last-child { border-bottom: none; }
    .named-num { font-size: 0.72rem; font-weight: 700; color: var(--text-2); width: 20px; flex-shrink: 0; }
    .named-player-name { flex: 1; color: var(--text); font-weight: 500; }
    .named-pos { font-size: 0.65rem; color: var(--text-2); background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; }
    .named-divider { font-size: 0.62rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-2); padding: 6px 0 4px; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.07); margin-top: 4px; }
    .named-not-yet { font-size: 0.82rem; color: var(--text-2); padding: 4px 0; }

    /* ── Line movement ── */
    .move-up   { color: #ff6b6b; font-size: 0.72rem; font-weight: 700; margin-left: 4px; }
    .move-down { color: var(--green); font-size: 0.72rem; font-weight: 700; margin-left: 4px; }
    .move-none { color: var(--text-2); font-size: 0.72rem; margin-left: 4px; }

    /* ── Value indicator ── */
    .value-badge { display: inline-block; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
    .value-badge--yes  { background: rgba(0,166,81,0.18); color: var(--green); }
    .value-badge--no   { background: rgba(255,255,255,0.07); color: var(--text-2); }
    .value-badge--fair { background: rgba(255,165,0,0.12); color: #ffa500; }

    /* ── Commentary ── */
    /* ── Zero Tackle articles ── */
    .zt-articles { display: flex; flex-direction: column; }
    .zt-article { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .zt-article:last-child { border-bottom: none; }
    .zt-article-tag { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; color: var(--green); margin-bottom: 4px; }
    .zt-article a { font-size: 0.84rem; font-weight: 600; color: var(--text); text-decoration: none; line-height: 1.4; display: block; margin-bottom: 3px; }
    .zt-article a:hover { color: var(--green); }
    .zt-article-desc { font-size: 0.72rem; color: var(--text-2); line-height: 1.45; }
    .zt-empty { font-size: 0.82rem; color: var(--text-2); }
    .zt-source { font-size: 0.71rem; color: var(--text-2); margin-top: 12px; opacity: 0.7; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

    .commentary-section { grid-column: 1 / -1; margin-bottom: 4px; }
    .commentary-body { display: flex; flex-direction: column; gap: 0; }
    .commentary-para { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.9rem; color: var(--text); line-height: 1.75; }
    .commentary-para:last-child { border-bottom: none; }
    .commentary-para strong { color: #fff; }
    .commentary-para em { color: var(--green); font-style: normal; font-weight: 600; }
    .commentary-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }

    /* ── Odds colour coding ── */
    /* Real odds sourced directly from The Odds API */
    .odd-real   { color: var(--green) !important; font-weight: 700; }
    /* Estimated/derived odds calculated from season stats or formulas */
    .odd-derived { color: #f0a500 !important; font-weight: 600; }

    /* ── Scoring patterns ── */
    .scoring-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .scoring-team-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-2); margin-bottom: 6px; }
    .scoring-period-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--nrl-green, #00b251); opacity: 0.8; margin-bottom: 4px; margin-top: 2px; }
    .scoring-stat { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.8rem; }
    .scoring-stat:last-child { border-bottom: none; }
    .scoring-stat-label { color: var(--text-2); }
    .scoring-stat-val { font-weight: 700; color: var(--text); }
    .scoring-stat-val.good { color: var(--green); }
    .scoring-stat-val.bad  { color: #ff6b6b; }
    .ou-trend { background: rgba(255,255,255,0.04); border-radius: 6px; padding: 10px 12px; margin-top: 4px; font-size: 0.8rem; }
    .ou-trend-title { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); margin-bottom: 6px; }
    .ou-pips { display: flex; gap: 4px; flex-wrap: wrap; }
    .ou-pip { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; }
    .ou-pip.over  { background: rgba(0,166,81,0.2); color: var(--green); }
    .ou-pip.under { background: rgba(255,255,255,0.07); color: var(--text-2); }
    .streak-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; }
    .streak-badge.win  { background: rgba(0,166,81,0.15); color: var(--green); }
    .streak-badge.loss { background: rgba(255,107,107,0.15); color: #ff6b6b; }

    /* ── Bookmaker comparison ── */
    .bookie-toggle { font-size: 0.72rem; color: var(--green); cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
    .bookie-toggle:hover { text-decoration: underline; }
    .bookie-comp { margin-top: 10px; overflow: hidden; }
    .bookie-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .bookie-table th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: left; }
    .bookie-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .bookie-table tr:last-child td { border-bottom: none; }
    .bookie-table .bk-odd { font-weight: 700; color: var(--green); font-family: var(--font-heading); font-size: 0.95rem; }
    .bookie-table .bk-best { color: #ffd700; }

    /* ── Bet slip ── */
    #betSlip { position: fixed; bottom: 24px; right: 24px; width: 290px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; transform: translateY(120%); transition: transform 0.3s ease; }
    #betSlip.open { transform: translateY(0); }
    .betslip-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(0,166,81,0.1); border-bottom: 1px solid var(--border); }
    .betslip-title { font-size: 0.82rem; font-weight: 800; color: var(--green); }
    .betslip-clear { font-size: 0.72rem; color: var(--text-2); background: none; border: none; cursor: pointer; font-family: inherit; }
    .betslip-clear:hover { color: #ff6b6b; }
    .betslip-items { max-height: 200px; overflow-y: auto; }
    .betslip-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.78rem; gap: 8px; }
    .betslip-item-desc { flex: 1; color: var(--text); line-height: 1.3; }
    .betslip-item-odd { font-weight: 700; color: var(--green); font-family: var(--font-heading); white-space: nowrap; }
    .betslip-remove { background: none; border: none; color: var(--text-2); cursor: pointer; font-size: 0.9rem; padding: 0; line-height: 1; }
    .betslip-remove:hover { color: #ff6b6b; }
    .betslip-footer { padding: 12px 14px; background: rgba(255,255,255,0.03); }
    .betslip-combined { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
    .betslip-combined strong { color: var(--green); font-family: var(--font-heading); font-size: 1rem; }
    .betslip-return { font-size: 0.72rem; color: var(--text-2); }
    .add-multi-btn { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 3px; background: rgba(0,166,81,0.12); color: var(--green); border: 1px solid rgba(0,166,81,0.25); cursor: pointer; font-family: inherit; white-space: nowrap; margin-left: 6px; }
    .add-multi-btn:hover { background: rgba(0,166,81,0.22); }
    .add-multi-btn.added { background: rgba(0,166,81,0.25); color: #fff; }

    /* ── Footer ── */
    .footer { border-top: 1px solid var(--border); padding: 24px 0; text-align: center; color: var(--text-2); font-size: 0.78rem; }
    .footer a { color: var(--green); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-2); }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Post-match result banner ── */
    .result-banner { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 20px; margin-bottom: 20px; }
    .result-banner-score { display: flex; align-items: center; justify-content: center; gap: 12px; font-family: var(--font-heading); font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
    .result-score-val { color: #fff; min-width: 36px; text-align: center; }
    .result-dash { color: var(--text-2); font-size: 1.4rem; }
    .result-winner { color: var(--green); }
    .result-loser  { color: var(--text-2); }
    .result-banner-tags { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .result-tag { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; }
    .result-tag--yes    { background: rgba(63,185,80,.15);  color: #3fb950; }
    .result-tag--no     { background: rgba(248,81,73,.15);  color: #f85149; }
    .result-tag--margin { background: rgba(255,255,255,.07); color: var(--text-2); }
    .result-tag--ou     { background: rgba(88,166,255,.12);  color: #58a6ff; }
    .badge-fulltime { background: rgba(63,185,80,.15); color: #3fb950; font-size: 0.85rem; }
    .badge-pending  { background: rgba(255,165,0,.12);  color: #f0a500; }
    .result-analysis-note { margin-bottom: 20px; background: rgba(255,165,0,0.07); border: 1px solid rgba(255,165,0,0.2); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 0.8rem; color: var(--text-2); }

    /* ── Game Navigation ── */
    .game-nav { background: var(--dark-2); border-bottom: 1px solid var(--border); padding: 8px 0; }
    .game-nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .game-nav-btn { font-size: 0.78rem; font-weight: 600; color: var(--text-2); text-decoration: none; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; display: inline-block; }
    .game-nav-btn:hover { background: rgba(255,255,255,0.09); color: #fff; border-color: rgba(255,255,255,0.15); }
    .game-nav-btn--disabled { opacity: 0.3; pointer-events: none; }
    .game-nav-count { font-size: 0.72rem; color: var(--text-2); white-space: nowrap; flex-shrink: 0; text-align: center; }

    /* ── Odds movement alert ── */
    .movement-alert { background: rgba(240,165,0,0.07); border: 1px solid rgba(240,165,0,0.28); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 20px; }
    .movement-alert-title { font-size: 0.72rem; font-weight: 800; color: #f0a500; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
    .movement-alert-item { font-size: 0.82rem; color: var(--text); padding: 4px 0; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .movement-alert-item + .movement-alert-item { border-top: 1px solid rgba(255,255,255,0.05); }
    .alert-sharp { font-size: 0.72rem; color: #ff6b6b; font-weight: 700; }
    .alert-drift { font-size: 0.72rem; color: var(--green); font-weight: 700; }
    .alert-note  { font-size: 0.72rem; color: var(--text-2); }

    /* ── Collapsible cards (mobile) ── */
    .card-toggle { float: right; font-size: 0.88rem; font-weight: 400; color: var(--text-2); margin-left: 6px; line-height: 1; }
    @media (max-width: 700px) {
      .card.collapsed .card-body { display: none; }
      .card.collapsed .card-label { margin-bottom: 0; }
      .card-label { cursor: pointer; user-select: none; }
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .page-grid { grid-template-columns: 1fr; }
      .player-picks-grid { grid-template-columns: 1fr; }
      .markets-grid { grid-template-columns: 1fr 1fr; }
      .team-list-grid { grid-template-columns: 1fr; gap: 0; }
      .injury-grid { grid-template-columns: 1fr; gap: 0; }
      .match-header { gap: 16px; }
      .match-logo { width: 64px; height: 64px; }
    }
    @media (max-width: 480px) {
      .markets-grid { grid-template-columns: 1fr; }
    }
  </style>

<body>

  <nav class="nav">
    <div class="container nav__inner">
      <div class="nav__logo">🏉 NRL<span>Betting</span>Guide</div>
      <a class="nav__back" href="index.html">← Back to Guide</a>
      <a class="nav__back" href="season.html" style="margin-left:8px">📊 Season</a>
      <button class="nav__back" id="shareBtn" onclick="shareAnalysis()" style="margin-left:8px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.07)">🔗 Share</button>
    </div>
  </nav>

  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading match analysis…</p>
    </div>
  </div>

  <script src="src/teamData.js?v=20"></script>
  <script src="src/oddsEngine.js?v=20"></script>
  <script>
  (async function() {
    // ── Helpers ──────────────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const gameId = parseInt(params.get('id') || '1', 10);

    function impl(odd) { return (100 / odd).toFixed(1) + '%'; }
    function toOddsStr(odd) { return '$' + Number(odd).toFixed(2); }

    // ── Load game data + real form strings in parallel ──────────────────────
    let game = null;
    let formData = null;
    const [oddsRes, formRes, teamListRes, statsRes, ztRes, h2hRes, openingRes, propsRes, resultsRes] = await Promise.allSettled([
      fetch(`src/live-odds.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/form-data.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/team-lists.json?v=${Date.now()}`).then(r => r.json()),
      fetch('src/player-stats.json').then(r => r.json()),
      fetch(`src/zerotackle-articles.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/h2h-data.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/odds-opening.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/player-props.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`src/results-history.json?v=${Date.now()}`).then(r => r.json()),
    ]);

    // ── Venue → coordinates map for Open-Meteo weather ──────────────────────
    const VENUE_COORDS = {
      'Suncorp Stadium':           { lat: -27.4648, lon: 153.0095, tz: 'Australia/Brisbane' },
      'GIO Stadium':               { lat: -35.2396, lon: 149.0930, tz: 'Australia/Sydney'   },
      'Accor Stadium':             { lat: -33.8468, lon: 151.0039, tz: 'Australia/Sydney'   },
      'PointsBet Stadium':         { lat: -34.0236, lon: 151.0872, tz: 'Australia/Sydney'   },
      'Cbus Super Stadium':        { lat: -27.9698, lon: 153.3830, tz: 'Australia/Brisbane' },
      '4 Pines Park':              { lat: -33.7946, lon: 151.2777, tz: 'Australia/Sydney'   },
      'AAMI Park':                 { lat: -37.8227, lon: 144.9831, tz: 'Australia/Melbourne'},
      'McDonald Jones Stadium':    { lat: -32.9259, lon: 151.7608, tz: 'Australia/Sydney'   },
      'Go Media Stadium':          { lat: -36.8755, lon: 174.7432, tz: 'Pacific/Auckland'   },
      'Qld Country Bank Stadium':  { lat: -19.2615, lon: 146.7879, tz: 'Australia/Brisbane' },
      'CommBank Stadium':          { lat: -33.8131, lon: 151.0037, tz: 'Australia/Sydney'   },
      'BlueBet Stadium':           { lat: -33.7510, lon: 150.6942, tz: 'Australia/Sydney'   },
      'Netstrata Jubilee Oval':    { lat: -33.9717, lon: 151.1060, tz: 'Australia/Sydney'   },
      'Allianz Stadium':           { lat: -33.8916, lon: 151.2252, tz: 'Australia/Sydney'   },
      'Campbelltown Stadium':      { lat: -34.0674, lon: 150.8127, tz: 'Australia/Sydney'   },
    };

    const WMO_DESC = {
      0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
      45:'Foggy', 48:'Foggy', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
      61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
      80:'Showers', 81:'Showers', 82:'Heavy showers', 95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm',
    };

    async function fetchWeather(venue, commenceTime) {
      const coords = VENUE_COORDS[venue];
      if (!coords || !commenceTime) return null;
      try {
        // Use UTC so time strings can be compared directly with commenceTime (which is UTC)
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}` +
          `&hourly=temperature_2m,precipitation_probability,weathercode&timezone=UTC&forecast_days=14`;
        const res = await fetch(url);
        const data = await res.json();
        // Find closest hour to kickoff time (both in UTC)
        const kickoff = new Date(commenceTime);
        const times = data.hourly.time.map(t => new Date(t + 'Z').getTime());
        let closest = 0, minDiff = Infinity;
        times.forEach((t, i) => { const d = Math.abs(t - kickoff); if (d < minDiff) { minDiff = d; closest = i; } });
        const code  = data.hourly.weathercode[closest];
        const temp  = Math.round(data.hourly.temperature_2m[closest]);
        const precip = data.hourly.precipitation_probability[closest];
        const desc  = WMO_DESC[code] ?? 'Cloudy';
        return `${desc}, ${temp}°C${precip > 40 ? ` (${precip}% rain chance)` : ''}`;
      } catch (e) {
        return null;
      }
    }

    let ztArticles = null;
    if (ztRes.status === 'fulfilled') ztArticles = ztRes.value;
    let h2hData = null;
    if (h2hRes.status === 'fulfilled') h2hData = h2hRes.value;
    let openingOdds = null;
    if (openingRes.status === 'fulfilled') openingOdds = openingRes.value;
    let playerProps = null;
    if (propsRes.status === 'fulfilled') playerProps = propsRes.value;
    let resultsData = null;
    if (resultsRes.status === 'fulfilled') resultsData = resultsRes.value;

    let upcoming = [];
    if (oddsRes.status === 'fulfilled') {
      const cutoff = Date.now() - 3 * 60 * 60 * 1000;
      upcoming = oddsRes.value.games.filter(g => new Date(g.commenceTime).getTime() > cutoff);
      const raw = upcoming[gameId - 1];
      if (raw) game = buildGameEntry(raw, gameId);
    }
    if (formRes.status === 'fulfilled') formData = formRes.value;
    let teamLists = null;
    if (teamListRes.status === 'fulfilled') teamLists = teamListRes.value;

    // ── Ladder position lookup ───────────────────────────────────────────────
    const LADDER_POS = {};
    (formData?.ladder || []).forEach(row => { LADDER_POS[row.name] = row.pos; });
    function ordinal(n) { return n + (['st','nd','rd'][n - 1] || 'th'); }

    // ── Inject real try rates from player-stats.json ─────────────────────────
    if (statsRes.status === 'fulfilled' && statsRes.value?.players) {
      const sp = statsRes.value.players;
      Object.values(NRL_TEAM_DATA).forEach(team => {
        (team.players || []).forEach(p => {
          const real = sp[p.name];
          if (real) p.tryRate = real.tryRate;
        });
      });
    }

    if (!game) {
      document.getElementById('app').innerHTML =
        '<div class="loading"><p>Match data unavailable. <a href="index.html">← Return to guide</a></p></div>';
      return;
    }

    const a = game.analysis;

    // ── Fetch real weather from Open-Meteo ───────────────────────────────────
    const realWeather = await fetchWeather(game.venue, game.commenceTime);
    if (realWeather) game.analysis.weatherForecast = realWeather;

    // ── Inject real form strings if available ────────────────────────────────
    if (formData?.teams) {
      const hForm = formData.teams[game.homeTeam.name]?.last5;
      const aForm = formData.teams[game.awayTeam.name]?.last5;
      if (hForm) a.homeFormLast5 = hForm;
      if (aForm) a.awayFormLast5 = aForm;
      if (formData.round) a._formRound = formData.round;
    }

    // ── Team logos from Wikipedia ────────────────────────────────────────────
    const LOGOS = {};
    await Promise.allSettled(
      Object.entries(NRL_TEAM_DATA)
        .filter(([,v]) => v.wikiPage)
        .map(async ([name, data]) => {
          try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(data.wikiPage)}`, {headers:{Accept:'application/json'}});
            const j = await r.json();
            if (j.thumbnail?.source) LOGOS[name] = j.thumbnail.source;
          } catch(_){}
        })
    );

    function logoImg(name, size=90) {
      const src = LOGOS[name];
      const emoji = NRL_TEAM_DATA[name]?.emoji ?? '🏉';
      if (src) return `<img class="match-logo" src="${src}" alt="${name}" width="${size}" height="${size}">`;
      return `<div class="match-logo-placeholder" style="font-size:${size*0.4}px">${emoji}</div>`;
    }

    // ── Player data ──────────────────────────────────────────────────────────
    function topPlayers(teamName, n=4) {
      return (NRL_TEAM_DATA[teamName]?.players || [])
        .slice().sort((a,b) => b.tryRate - a.tryRate).slice(0, n);
    }

    function ftsOdd(player) {
      // First try scorer: anytime rate × ~0.45 share, with vig
      const p = player.tryRate * 0.42;
      return Math.max(3.0, +(1.06 / p).toFixed(2));
    }
    function anytimeOdd(player) {
      const p = Math.min(0.92, player.tryRate);
      return Math.max(1.3, +(1.06 / p).toFixed(2));
    }

    // ── Form parsing ─────────────────────────────────────────────────────────
    function formBadges(formStr) {
      // Accepts "W W L W D" or "3W 2L" style
      let results = [];
      if (formStr.includes(' ') && !formStr.match(/\d/)) {
        results = formStr.trim().split(/\s+/).slice(0, 5);
      } else {
        // Parse "3W 1D 1L"
        const matches = [...formStr.matchAll(/(\d+)([WLD])/gi)];
        for (const m of matches) for (let i=0;i<parseInt(m[1]);i++) results.push(m[2].toUpperCase());
        results = results.slice(0, 5);
      }
      if (!results.length) results = ['W','W','L','W','L'];
      return results.map(r => {
        const cls = r==='W'?'form-w':r==='L'?'form-l':'form-d';
        return `<div class="form-badge ${cls}">${r}</div>`;
      }).join('');
    }

    // ── Win probability helpers ──────────────────────────────────────────────
    const hProb = 1 / game.h2h.home;
    const aProb = 1 / game.h2h.away;
    const normH = hProb / (hProb + aProb);

    const totalExp = game.ou.over.label ? parseFloat(game.ou.over.label) : 42;
    const lineVal  = game.line.home.label ? parseFloat(game.line.home.label) : 0;

    // ── Win probability for display ──────────────────────────────────────────
    const homeWinPct = (normH * 100).toFixed(0);
    const awayWinPct = (100 - normH * 100).toFixed(0);
    const isFavHome = game.h2h.home <= game.h2h.away;

    // ── Best value picks ─────────────────────────────────────────────────────
    const homePlayers = topPlayers(game.homeTeam.name);
    const awayPlayers = topPlayers(game.awayTeam.name);
    const allPlayers  = [...homePlayers.map(p=>({...p,team:game.homeTeam.name})),
                         ...awayPlayers.map(p=>({...p,team:game.awayTeam.name}))]
                         .sort((a,b)=>b.tryRate-a.tryRate);

    // ── Named Team List ───────────────────────────────────────────────────────
    function renderTeamList(teamName) {
      const players = teamLists?.teams?.[teamName];
      if (!players || !players.length) {
        return '<div class="team-list-pending">⏳ Team not yet announced</div>';
      }
      const starters    = players.filter(p => p.category === 'starting');
      const interchange = players.filter(p => p.category === 'interchange');
      const reserves    = players.filter(p => p.category === 'reserve');

      const row = p => `
        <div class="team-list-player">
          <span class="player-num">${p.number}</span>
          <span class="player-name-cell">${p.name}</span>
          <span class="player-pos-badge">${p.position}</span>
        </div>`;

      let html = starters.map(row).join('');
      if (interchange.length) {
        html += `<div class="team-list-section-label">Interchange</div>` + interchange.map(row).join('');
      }
      if (reserves.length) {
        html += `<div class="team-list-section-label">Reserves</div>` + reserves.map(row).join('');
      }
      return html;
    }

    // ── Injury Report (real NRL Casualty Ward data) ──────────────────────────
    const _sp = statsRes.status === 'fulfilled' ? (statsRes.value?.players || {}) : {};
    const _currentRound = teamLists?.round ?? 0;

    // ── H2H record card ──────────────────────────────────────────────────────
    function renderH2H(homeTeam, awayTeam) {
      const key = `${homeTeam} vs ${awayTeam}`;
      const d = h2hData?.matches?.[key];
      if (!d) return '<div class="h2h-no-data">H2H data unavailable.</div>';

      const { overall, recent } = d;
      const totalH2H = overall.played || 0;
      // Count actual wins for each named team across all time
      // overall.homeWins/awayWins reflect fixture role, not team identity
      // Use recent matches to determine per-team win counts in last meetings
      const h1 = recent.team1Wins;
      const h2 = recent.team2Wins;
      const recentPlayed = recent.matches.length;
      const draws = recentPlayed - h1 - h2;

      // Extract season year from match URLs (e.g. /nrl-premiership/2025/)
      const seasonYear = (() => {
        const url = recent.matches?.[0]?.url || '';
        const m = url.match(/nrl-premiership\/(\d{4})\//);
        return m ? m[1] : '2025';
      })();

      // For overall, derive from overall.homeWins + awayWins (these are role-based)
      // We show this as total played + recent breakdown
      const homeShort = homeTeam.split(' ').pop();
      const awayShort = awayTeam.split(' ').pop();

      const summaryHtml = `
        <div class="h2h-summary">
          <div class="h2h-team-block">
            <div class="h2h-team-name">${homeShort}</div>
            <div class="h2h-team-wins ${h1 > h2 ? 'dominant' : ''}">${h1}</div>
            <div style="font-size:0.65rem;color:var(--text-2)">${seasonYear} season</div>
          </div>
          <div class="h2h-mid">
            <div class="h2h-played">${totalH2H}</div>
            <div>all time</div>
            ${draws > 0 ? `<div>${draws} draw${draws > 1 ? 's' : ''}</div>` : ''}
          </div>
          <div class="h2h-team-block">
            <div class="h2h-team-name">${awayShort}</div>
            <div class="h2h-team-wins ${h2 > h1 ? 'dominant' : ''}">${h2}</div>
            <div style="font-size:0.65rem;color:var(--text-2)">${seasonYear} season</div>
          </div>
        </div>`;

      const matchRows = recent.matches.map(m => {
        const winnerShort = m.winner.split(' ').pop();
        const yr = m.url?.match(/nrl-premiership\/(\d{4})\//);
        const matchYear = yr ? yr[1] : '';
        return `
          <div class="h2h-match">
            <div class="h2h-match-round">${m.round}${matchYear ? `<span class="h2h-match-year">${matchYear}</span>` : ''}</div>
            <div class="h2h-match-teams">${m.homeTeam.split(' ').pop()} v ${m.awayTeam.split(' ').pop()}</div>
            <div class="h2h-match-score">${m.homeScore}–${m.awayScore}</div>
            <div class="h2h-match-winner">${winnerShort}</div>
          </div>`;
      }).join('');

      return summaryHtml + `<div class="h2h-matches">${matchRows || '<div class="h2h-no-data">No recent meetings on record.</div>'}</div>
        <div class="h2h-source-note">📋 ${seasonYear} NRL season — via NRL.com match centre</div>`;
    }

    // ── Named 17s card ───────────────────────────────────────────────────────
    function renderNamedTeam(teamName) {
      const players = teamLists?.teams?.[teamName];
      if (!players?.length) {
        return '<div class="named-not-yet">⏳ Not yet announced — check back Thursday night.</div>';
      }
      const starters     = players.filter(p => p.category === 'starting');
      const interchange  = players.filter(p => p.category === 'interchange');

      const rows = (list, label) => {
        if (!list.length) return '';
        return list.map((p, i) => `
          <div class="named-player">
            <div class="named-num">${p.number || i + 1}</div>
            <div class="named-player-name">${p.name}</div>
            ${p.position ? `<div class="named-pos">${p.position}</div>` : ''}
          </div>`).join('');
      };

      return `
        ${rows(starters, 'Starting 13')}
        ${interchange.length ? `<div class="named-divider">Interchange</div>${rows(interchange)}` : ''}`;
    }

    // ── Line movement helper ─────────────────────────────────────────────────
    function movementHtml(current, opening) {
      if (!opening || !current || opening === null) return '';
      const diff = (current - opening).toFixed(2);
      if (Math.abs(diff) < 0.04) return `<span class="move-none">—</span>`;
      return diff > 0
        ? `<span class="move-up">▲${Math.abs(diff)}</span>`
        : `<span class="move-down">▼${Math.abs(diff)}</span>`;
    }

    // ── Value indicator ──────────────────────────────────────────────────────
    function calcValue(game, formData) {
      // Market implied probabilities (vig-removed)
      const ho = game.h2h.home, ao = game.h2h.away;
      if (!ho || !ao) return null;
      const total = 1/ho + 1/ao;
      const mktHomePct = (1/ho / total) * 100;

      // ── Form component ──
      const homeForm = formData?.teams?.[game.homeTeam.name]?.last5 || '';
      const awayForm = formData?.teams?.[game.awayTeam.name]?.last5 || '';
      const homeWins = (homeForm.match(/W/g) || []).length;
      const awayWins = (awayForm.match(/W/g) || []).length;
      const formEdge = (homeWins - awayWins) * 3.5; // ±3.5% per win difference

      // ── Ladder component ──
      const homePos = LADDER_POS[game.homeTeam.name] || 9;
      const awayPos = LADDER_POS[game.awayTeam.name] || 9;
      const ladderEdge = (awayPos - homePos) * 1.5; // ±1.5% per ladder place

      // ── Home advantage ──
      const homeAdv = 3;

      // ── H2H dominance component (NEW) ──
      let h2hEdge = 0;
      const h2hKey = `${game.homeTeam.name} vs ${game.awayTeam.name}`;
      const h2hEntry = h2hData?.matches?.[h2hKey];
      if (h2hEntry?.recent?.matches?.length >= 3) {
        const hW = h2hEntry.recent.team1Wins || 0;
        const aW = h2hEntry.recent.team2Wins || 0;
        const played = h2hEntry.recent.matches.length;
        // ±7% for complete head-to-head dominance (5-0)
        h2hEdge = ((hW - aW) / played) * 7;
      }

      // ── Injury impact component (NEW) ──
      let injuryEdge = 0;
      if (teamLists?.casualties) {
        const round = teamLists.round || 0;
        const missing = teamName => (teamLists.casualties[teamName] || []).filter(c => {
          if (/suspension/i.test(c.injury)) return true;
          const m = (c.expectedReturn || '').match(/Round (\d+)/i);
          return !m || parseInt(m[1]) > round + 1;
        }).length;
        const homeMissing = missing(game.homeTeam.name);
        const awayMissing = missing(game.awayTeam.name);
        // Each net missing player worth ~1.5% shift
        injuryEdge = (awayMissing - homeMissing) * 1.5;
      }

      const components = [
        formEdge   !== 0 ? `form ${formEdge   > 0 ? '+' : ''}${formEdge.toFixed(0)}%`   : null,
        ladderEdge !== 0 ? `ladder ${ladderEdge > 0 ? '+' : ''}${ladderEdge.toFixed(0)}%` : null,
        h2hEdge    !== 0 ? `H2H ${h2hEdge     > 0 ? '+' : ''}${h2hEdge.toFixed(0)}%`   : null,
        injuryEdge !== 0 ? `injuries ${injuryEdge > 0 ? '+' : ''}${injuryEdge.toFixed(0)}%` : null,
      ].filter(Boolean).join(' · ') || 'balanced matchup';

      let modelHomePct = 50 + formEdge + ladderEdge + homeAdv + h2hEdge + injuryEdge;
      modelHomePct = Math.max(20, Math.min(80, modelHomePct));

      const gap = modelHomePct - mktHomePct;

      let valueTeam, badge, detail;
      if (gap > 6) {
        valueTeam = game.homeTeam.name.split(' ').pop();
        badge = `<span class="value-badge value-badge--yes">Value: ${valueTeam}</span>`;
        detail = `Model ${Math.round(modelHomePct)}% vs market ${Math.round(mktHomePct)}% · ${components}`;
      } else if (gap < -6) {
        valueTeam = game.awayTeam.name.split(' ').pop();
        badge = `<span class="value-badge value-badge--yes">Value: ${valueTeam}</span>`;
        detail = `Model ${Math.round(100 - modelHomePct)}% vs market ${Math.round(100 - mktHomePct)}% · ${components}`;
      } else {
        badge = `<span class="value-badge value-badge--fair">Fair price</span>`;
        detail = `Model ${Math.round(modelHomePct)}% ≈ market ${Math.round(mktHomePct)}% · ${components}`;
      }

      return { badge, detail, modelHomePct, mktHomePct };
    }

    // ── Streak helper ────────────────────────────────────────────────────────
    function calcStreak(form) {
      if (!form?.length) return null;
      const type = form[0].result; // 'Won' or 'Lost'
      let count = 0;
      for (const f of form) { if (f.result === type) count++; else break; }
      return { count, isWin: type === 'Won' };
    }

    function streakBadge(form) {
      const s = calcStreak(form);
      if (!s) return '';
      const cls = s.isWin ? 'win' : 'loss';
      const label = s.isWin ? `🔥 W${s.count} streak` : `❄️ L${s.count} streak`;
      return `<span class="streak-badge ${cls}">${label}</span>`;
    }

    // ── Scoring patterns card ────────────────────────────────────────────────
    function renderScoringPatterns(homeTeam, awayTeam) {
      const key = `${homeTeam} vs ${awayTeam}`;
      const d = h2hData?.matches?.[key];
      if (!d) return '<div class="h2h-no-data">Scoring data unavailable.</div>';

      const hs = d.seasonStats?.home || {};
      const as_ = d.seasonStats?.away || {};
      const ouLine = game.ou?.total;

      // Parse score strings for O/U trend
      const parseScores = form => form.map(f => {
        const parts = (f.score || '0-0').split('-').map(Number);
        return { forTeam: parts[0] || 0, against: parts[1] || 0, total: (parts[0] || 0) + (parts[1] || 0) };
      });
      const homeScores = parseScores(d.homeForm || []);
      const awayScores = parseScores(d.awayForm || []);

      const statRow = (label, val, better) => {
        const cls = better === 'high' && val > 0 ? 'good' : better === 'low' && val < 30 ? 'good' : '';
        return `<div class="scoring-stat">
          <span class="scoring-stat-label">${label}</span>
          <span class="scoring-stat-val ${cls}">${val ?? '—'}</span>
        </div>`;
      };

      // H2H venue record for each team
      const overall = d.overall || {};
      const hVenueW = overall.homeWins || 0;
      const hVenueL = overall.awayWins || 0;
      const hVenuePct = (hVenueW + hVenueL) > 0 ? Math.round(hVenueW / (hVenueW + hVenueL) * 100) : 0;
      const aVenueW = overall.awayWins || 0;
      const aVenueL = overall.homeWins || 0;
      const aVenuePct = (aVenueW + aVenueL) > 0 ? Math.round(aVenueW / (aVenueW + aVenueL) * 100) : 0;

      const teamPanel = (label, stats, scores, venueW, venueL, venuePct) => `
        <div>
          <div class="scoring-team-label">${label}</div>
          <div class="scoring-period-label">2026 Season</div>
          ${statRow('Avg scored', stats.avgScored)}
          ${statRow('Avg conceded', stats.avgConceded)}
          ${statRow('Completion %', stats.completionRate ? stats.completionRate + '%' : null)}
          <div class="scoring-period-label" style="margin-top:8px">H2H at this venue</div>
          ${statRow('Record', `${venueW}W / ${venueL}L`)}
          ${statRow('Win %', venuePct + '%')}
        </div>`;

      // O/U pip strip
      let ouHtml = '';
      if (ouLine) {
        const allScores = [...homeScores, ...awayScores];
        const teams = [
          { label: homeTeam.split(' ').pop(), scores: homeScores },
          { label: awayTeam.split(' ').pop(), scores: awayScores },
        ];
        ouHtml = teams.map(t => {
          const overCount = t.scores.filter(s => s.total > ouLine).length;
          const pips = t.scores.map(s =>
            `<div class="ou-pip ${s.total > ouLine ? 'over' : 'under'}" title="${s.forTeam}–${s.against} (${s.total} pts)">${s.total > ouLine ? 'O' : 'U'}</div>`
          ).join('');
          return `
            <div style="margin-bottom:8px">
              <div style="font-size:0.68rem;color:var(--text-2);margin-bottom:4px">${t.label} — last 5 vs O/U ${ouLine}: <strong style="color:${overCount >= 3 ? 'var(--green)' : 'var(--text)'}">${overCount}/5 over</strong></div>
              <div class="ou-pips">${pips}</div>
            </div>`;
        }).join('');
      }

      return `
        <div class="scoring-grid">
          ${teamPanel(homeTeam.split(' ').pop(), hs, homeScores, hVenueW, hVenueL, hVenuePct)}
          ${teamPanel(awayTeam.split(' ').pop(), as_, awayScores, aVenueW, aVenueL, aVenuePct)}
        </div>
        ${ouLine ? `<div class="ou-trend"><div class="ou-trend-title">📊 O/U ${ouLine} Trend — last 5 games</div>${ouHtml}</div>` : ''}`;
    }

    // ── Bookmaker comparison ─────────────────────────────────────────────────
    function renderBookmakerComparison(g) {
      const bks = g.bookmakerComparison;
      if (!bks?.length) return '';

      // Find best (highest) odd for each side
      const bestHome = Math.max(...bks.map(b => b.home || 0));
      const bestAway = Math.max(...bks.map(b => b.away || 0));

      const rows = bks.map(b => `
        <tr>
          <td style="color:var(--text)">${b.name}</td>
          <td><span class="bk-odd${b.home === bestHome ? ' bk-best' : ''}">${b.home ? '$' + b.home.toFixed(2) : '—'}</span></td>
          <td><span class="bk-odd${b.away === bestAway ? ' bk-best' : ''}">${b.away ? '$' + b.away.toFixed(2) : '—'}</span></td>
        </tr>`).join('');

      return `
        <div class="bookie-comp" id="bookieComp" style="display:none">
          <table class="bookie-table">
            <thead><tr>
              <th>Bookmaker</th>
              <th>${g.homeTeam.split(' ').pop()}</th>
              <th>${g.awayTeam.split(' ').pop()}</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="font-size:0.65rem;color:var(--text-2);margin-top:6px">🏆 <span style="color:#ffd700">Gold</span> = best available odd</div>
        </div>`;
    }

    function renderArticles(homeTeam, awayTeam) {
      if (!ztArticles?.articles?.length) {
        return '<div class="zt-empty">No articles available yet — check back closer to game day.</div>';
      }

      // Team-specific articles first, then general round previews
      const teamMatches = ztArticles.articles.filter(a =>
        a.teams.includes(homeTeam) || a.teams.includes(awayTeam)
      );
      const roundOnly = ztArticles.articles.filter(a =>
        a.isRound && !teamMatches.includes(a)
      );
      const combined = [...teamMatches, ...roundOnly].slice(0, 5);

      if (!combined.length) {
        return '<div class="zt-empty">No articles found for this match yet — check back mid-week.</div>';
      }

      return combined.map(art => {
        const matchedTeams = art.teams.filter(t => t === homeTeam || t === awayTeam);
        const tag = matchedTeams.length
          ? matchedTeams.map(t => t.split(' ').pop()).join(' · ')
          : 'Round Preview';
        const desc = art.description
          ? `<div class="zt-article-desc">${art.description.slice(0, 130)}${art.description.length > 130 ? '…' : ''}</div>`
          : '';
        return `
          <div class="zt-article">
            <div class="zt-article-tag">${tag}</div>
            <a href="${art.url}" target="_blank" rel="noopener">${art.title}</a>
            ${desc}
          </div>`;
      }).join('');
    }

    function injurySeverity(inj) {
      const ret = inj.expectedReturn;
      if (/suspension/i.test(inj.injury)) return { label: 'Suspended', cls: 'sev-suspended' };
      if (!ret || ret === 'TBC' || ret === 'Indefinite' || ret === 'Next Season') return { label: 'Long-term', cls: 'sev-longterm' };
      const m = ret.match(/Round (\d+)/i);
      if (!m) return { label: 'TBC', cls: 'sev-longterm' };
      const roundsOut = parseInt(m[1]) - _currentRound;
      if (roundsOut <= 1) return { label: 'Minor', cls: 'sev-minor' };
      if (roundsOut <= 3) return { label: 'Moderate', cls: 'sev-moderate' };
      return { label: 'Serious', cls: 'sev-serious' };
    }

    function returnDetail(ret) {
      if (!ret || ret === 'TBC' || ret === 'Indefinite' || ret === 'Next Season') {
        return { when: ret || 'TBC', rounds: null };
      }
      const m = ret.match(/Round (\d+)/i);
      if (!m) return { when: ret, rounds: null };
      const roundsOut = parseInt(m[1]) - _currentRound;
      const roundsText = roundsOut <= 0 ? 'available now' : roundsOut === 1 ? 'next game' : `${roundsOut} rounds away`;
      return { when: ret, rounds: roundsText };
    }

    function renderCasualties(teamName) {
      const injuries = teamLists?.casualties?.[teamName];
      if (!injuries || !injuries.length) {
        return '<div class="no-casualties">✅ No players on the casualty list</div>';
      }
      return injuries.map(inj => {
        const sev = injurySeverity(inj);
        const ret = returnDetail(inj.expectedReturn);
        const playerStats = _sp[inj.name];
        const pos = playerStats?.position || '';
        const imgSrc = inj.imageUrl
          ? (inj.imageUrl.startsWith('/') ? 'https://www.nrl.com' + inj.imageUrl : inj.imageUrl)
          : '';
        const nameHtml = inj.profileUrl
          ? `<a href="${inj.profileUrl}" target="_blank" rel="noopener">${inj.name}</a>`
          : inj.name;
        const photoHtml = imgSrc
          ? `<img class="inj-photo" src="${imgSrc}" alt="${inj.name}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'inj-photo-placeholder',textContent:'🏉'}))">`
          : `<div class="inj-photo-placeholder">🏉</div>`;
        return `
          <div class="injury-item">
            ${photoHtml}
            <div class="injury-info">
              <div class="inj-header">
                <div class="injury-name">${nameHtml}</div>
                <span class="inj-sev ${sev.cls}">${sev.label}</span>
              </div>
              ${pos ? `<div class="inj-pos">${pos}</div>` : ''}
              <div class="inj-detail">
                <span class="inj-type-tag">${inj.injury}</span>
                <span>·</span>
                <span class="inj-return-text">Back <span class="inj-return-rounds">${ret.when}</span>${ret.rounds ? ` <span style="opacity:0.6">(${ret.rounds})</span>` : ''}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Match Commentary Generator ───────────────────────────────────────────
    function generateMatchCommentary(game, a) {
      const home = game.homeTeam.name;
      const away = game.awayTeam.name;
      const homeShort = home.split(' ').pop();
      const awayShort = away.split(' ').pop();
      const fav = a.favourite;
      const dog = fav === home ? away : home;
      const favShort = fav.split(' ').pop();
      const dogShort = dog.split(' ').pop();
      const favOdd = fav === home ? game.h2h.home : game.h2h.away;
      const dogOdd = fav === home ? game.h2h.away : game.h2h.home;
      const favPct = fav === home ? homeWinPct : awayWinPct;
      const margin = parseFloat(a.avgMargin) || 10;
      const lineLabel = fav === home ? game.line.home.label : game.line.away.label;
      const lineOdd = fav === home ? game.line.home.odd : game.line.away.odd;
      const confidence = (a.confidenceLevel || 'moderate').toLowerCase();
      const weather = a.weatherForecast || 'Fine';
      const isWet = /rain|wet|storm/i.test(weather);
      const isClear = /clear|fine|sunny|dry/i.test(weather);
      const topHome = homePlayers[0];
      const topAway = awayPlayers[0];
      const topFavPlayer = fav === home ? topHome : topAway;
      const topDogPlayer = fav === home ? topAway : topHome;
      const homeForm = a.homeFormLast5 || '';
      const awayForm = a.awayFormLast5 || '';
      const homeWins = (homeForm.match(/W/gi) || []).length;
      const awayWins = (awayForm.match(/W/gi) || []).length;
      const favWins = fav === home ? homeWins : awayWins;
      const dogWins = fav === home ? awayWins : homeWins;
      const homeNamed = !!(teamLists?.teams?.[home]?.length);
      const awayNamed = !!(teamLists?.teams?.[away]?.length);
      const homeCasualties = teamLists?.casualties?.[home] || [];
      const awayCasualties = teamLists?.casualties?.[away] || [];
      const homeMissing = homeCasualties.filter(c => c.expectedReturn === 'TBC' || c.expectedReturn === 'Indefinite' || parseInt((c.expectedReturn.match(/\d+/)||[])[0]||99) > (teamLists?.round||0) + 1);
      const awayMissing = awayCasualties.filter(c => c.expectedReturn === 'TBC' || c.expectedReturn === 'Indefinite' || parseInt((c.expectedReturn.match(/\d+/)||[])[0]||99) > (teamLists?.round||0) + 1);
      const favMissing = fav === home ? homeMissing : awayMissing;
      const dogMissing = fav === home ? awayMissing : homeMissing;

      // ── Para 1: Match Preview ──────────────────────────────────────────────
      const confidenceWord = confidence === 'high' ? 'a strong' : confidence === 'very high' ? 'a dominant' : 'a moderate';
      const venueContext = game.venue ? `at <strong>${game.venue}</strong>` : 'this weekend';
      let p1 = `<div class="commentary-label">📋 Match Preview</div>
        <strong>${home}</strong> host <strong>${away}</strong> ${venueContext} in what shapes as ${confidenceWord} fixture for the ${favShort}.
        The markets are telling a clear story — <em>${fav}</em> are priced at <span class="odd-real">$${favOdd.toFixed(2)}</span> (implying a ${favPct}% win probability),
        while ${dogShort} come in as ${parseFloat(dogOdd) > 3 ? 'significant' : 'slight'} outsiders at <span class="odd-real">$${dogOdd.toFixed(2)}</span>.
        ${margin > 12 ? `An average winning margin of <strong>${a.avgMargin}</strong> suggests ${favShort} are capable of pulling away if they find their rhythm early.`
        : `With an average margin of just <strong>${a.avgMargin}</strong>, don't be surprised if ${dogShort} keep this one closer than the odds suggest.`}`;
      if (isWet) p1 += ` The forecast of <strong>${weather}</strong> will be a major factor — wet conditions typically tighten scorelines and reduce try-scoring, which could benefit the underdog.`;
      else if (isClear) p1 += ` Ideal conditions are forecast (<strong>${weather}</strong>), which should open up the game and favour the team with the more dangerous attacking options.`;

      // ── Para 2: Form Analysis ──────────────────────────────────────────────
      let p2 = `<div class="commentary-label">📈 Form Analysis</div>`;
      const formPhrase = (wins, team) => {
        if (wins >= 4) return `<strong>${team}</strong> arrive in red-hot form, winning <strong>${wins} of their last 5</strong>`;
        if (wins === 3) return `<strong>${team}</strong> have been solid, taking <strong>3 from 5</strong>`;
        if (wins === 2) return `<strong>${team}</strong> have been inconsistent, managing just <strong>2 from 5</strong>`;
        return `<strong>${team}</strong> are in poor form, winning just <strong>${wins} of their last 5</strong>`;
      };
      p2 += `${formPhrase(homeWins, homeShort)} and ${formPhrase(awayWins, awayShort).replace(/^<strong>/, '').replace(/<\/strong>/, '')} recent outings.
        ${favWins >= 4 ? `${favShort}'s form going into this one is difficult to argue with — they've found a consistency that makes them a reliable option in head-to-head markets.`
        : favWins === 3 ? `${favShort} have shown enough in recent weeks to justify favouritism, though they'll want to sharpen up from some patchy performances.`
        : `Despite being the market favourite, ${favShort} have had a mixed run of late. Punters should note this inconsistency before backing them at short odds.`}
        ${dogWins >= 3 ? ` ${dogShort} may be underestimated here — their recent form suggests they're more competitive than the odds imply, making the line bet or even an upset a genuine consideration.` : ''}`;

      // ── Para 3: Key Matchup & Players ─────────────────────────────────────
      let p3 = `<div class="commentary-label">⚡ Key Matchup</div>`;
      p3 += `The battle to watch is ${topFavPlayer ? `<strong>${topFavPlayer.name}</strong> (${topFavPlayer.pos}, ${favShort})` : `${favShort}'s attacking line`}
        against ${topDogPlayer ? `<strong>${topDogPlayer.name}</strong> (${topDogPlayer.pos}, ${dogShort})` : `${dogShort}'s defence`}.
        ${topFavPlayer ? `${topFavPlayer.name} is averaging <strong>${topFavPlayer.tryRate >= 1 ? topFavPlayer.tryRate.toFixed(2) + ' tries per game' : Math.round(topFavPlayer.tryRate * 100) + '% try-scoring rate'}</strong> this season and is the biggest threat to the line — back them as an anytime try scorer at <span class="odd-derived">$${anytimeOdd(topFavPlayer).toFixed(2)}</span>.` : ''}
        ${topDogPlayer ? `Meanwhile, ${topDogPlayer.name} for ${dogShort} is one to watch if the game opens up — priced at <span class="odd-derived">$${anytimeOdd(topDogPlayer).toFixed(2)}</span> anytime, they represent potential value if ${dogShort} stay in the contest.` : ''}`;
      if (favMissing.length > 0) {
        const names = favMissing.slice(0, 2).map(c => c.name).join(', ');
        p3 += ` <strong>Note:</strong> ${favShort} are without <strong>${names}${favMissing.length > 2 ? ` and ${favMissing.length - 2} others` : ''}</strong> — see the Injury Report for full details.`;
      } else if (homeNamed || awayNamed) {
        p3 += ` Check the <strong>Named Teams</strong> card for the official 1–17 — any surprise omissions are worth factoring into your selections.`;
      }

      // ── Para 4: Betting Strategy ──────────────────────────────────────────
      let p4 = `<div class="commentary-label">💰 Betting Strategy</div>`;
      const lineVal2 = lineLabel ? parseFloat(lineLabel) : 0;
      if (confidence === 'high' || confidence === 'very high') {
        p4 += `Given the <strong>${confidence} confidence</strong> rating and ${favShort}'s current odds of <span class="odd-real">$${favOdd.toFixed(2)}</span>,
          the head-to-head is the cleanest entry point for conservative punters.
          ${Math.abs(lineVal2) <= 10 ? `The line bet (<em>${favShort} ${lineLabel}</em> at <span class="odd-real">$${lineOdd.toFixed(2)}</span>) also offers solid value — the handicap is manageable given the expected margin.`
          : `The line bet requires ${favShort} to cover <strong>${Math.abs(lineVal2)} points</strong>, which is aggressive given the implied margin. Stick to the straight H2H for lower risk.`}`;
      } else {
        p4 += `With a <strong>${confidence} confidence</strong> read on this match, the safer play is to lean toward smaller stakes or side markets rather than heavy investment on the head-to-head.
          The line bet (<em>${favShort} ${lineLabel}</em> at <span class="odd-real">$${lineOdd.toFixed(2)}</span>) effectively hedges your position — you still need ${favShort} to win, but the spread gives extra cover in a close match.`;
      }
      if (isWet) p4 += ` In wet conditions, the Over/Under market shifts significantly — lean <strong>Under ${game.ou.under.label}</strong> as teams opt for kick-chase football over expansive attack.`;
      else p4 += ` In ${isClear ? 'clear' : 'expected'} conditions, the <strong>Over ${game.ou.over.label}</strong> has a reasonable case — both squads have the attacking talent to push past the line in open play.`;

      // ── Para 5: Risk Snapshot ─────────────────────────────────────────────
      let p5 = `<div class="commentary-label">🔍 Risk Snapshot</div>`;
      p5 += `Overall risk profile for this game is <strong>${confidence === 'high' || confidence === 'very high' ? 'lower than average' : 'moderate'}</strong>.
        ${homeCasualties.length + awayCasualties.length > 6
          ? `Both squads have significant injury concerns — <strong>${homeCasualties.length + awayCasualties.length} players</strong> are on the casualty list between them. Check the Injury Report card for full details and expected return dates.`
          : (homeNamed && awayNamed)
            ? `Both official 17s have been named — check the Named Teams and Injury Report cards for any notable absences before finalising your selections.`
            : `Teams are yet to be officially announced — monitor NRL.com Thursday night for the named squads, as key absences can shift the market significantly.`}
        The safest bet structure is <strong>${fav} to win + ${topFavPlayer?.name ?? 'top try threat'} anytime try scorer</strong> as a two-leg multi,
        offering a combined return of roughly <span class="odd-derived">$${(favOdd * anytimeOdd(topFavPlayer ?? allPlayers[0]) * 0.85).toFixed(2)}</span> for a modest stake.
        Always set a budget before placing — odds are educational simulations and real betting outcomes vary.`;

      return [p1, p2, p3, p4, p5].map(p => `<div class="commentary-para">${p}</div>`).join('');
    }

    // ── Game result lookup ───────────────────────────────────────────────────
    let gameResult = null;
    if (resultsData?.rounds) {
      for (const r of resultsData.rounds) {
        const found = (r.games || []).find(g =>
          g.homeTeam === game.homeTeam.name && g.awayTeam === game.awayTeam.name
        );
        if (found) { gameResult = { ...found, round: r.round }; break; }
      }
    }
    // Detect in-progress / pending: game started but result not yet in history
    const kickoffMs = new Date(game.commenceTime).getTime();
    const isStarted  = Date.now() > kickoffMs;
    const isPending  = isStarted && !gameResult;   // started, not yet in results-history

    // ── Result banner ────────────────────────────────────────────────────────
    function buildResultBanner() {
      if (!gameResult) {
        if (!isPending) return '';
        return `<div class="result-analysis-note">⏳ This game has kicked off — result will appear once the match is complete and data is updated.</div>`;
      }
      const home    = game.homeTeam.name.split(' ').pop();
      const away    = game.awayTeam.name.split(' ').pop();
      const homeWon = gameResult.homeScore > gameResult.awayScore;
      const awayWon = gameResult.awayScore > gameResult.homeScore;
      const favTag  = gameResult.favouriteWon !== undefined
        ? `<span class="result-tag result-tag--${gameResult.favouriteWon ? 'yes' : 'no'}">${gameResult.favouriteWon ? '✅ Favourite won' : '❌ Upset'}</span>`
        : '';
      const lineTag = gameResult.lineCovered !== null && gameResult.lineCovered !== undefined
        ? `<span class="result-tag result-tag--${gameResult.lineCovered ? 'yes' : 'no'}">${gameResult.lineCovered ? '✅ Line covered' : '❌ Line missed'}</span>`
        : '';
      const ouTag = gameResult.ouResult
        ? `<span class="result-tag result-tag--ou">${gameResult.ouResult === 'Over' ? '📈 Over' : '📉 Under'} ${gameResult.ouTotal}</span>`
        : '';
      return `

        <div class="result-banner-score">
          <span class="${homeWon ? 'result-winner' : 'result-loser'}">${home}</span>

    // ── Game navigation bar ──────────────────────────────────────────────────
    function buildGameNav() {
      if (upcoming.length <= 1) return '';

      const short = t => t.split(' ').pop();
      const prevHtml = prevRaw
        ? `<a class="game-nav-btn" href="analysis.html?id=${gameId - 1}">← ${short(prevRaw.homeTeam)} v ${short(prevRaw.awayTeam)}</a>`

      const nextHtml = nextRaw
        ? `<a class="game-nav-btn" href="analysis.html?id=${gameId + 1}" style="text-align:right">${short(nextRaw.homeTeam)} v ${short(nextRaw.awayTeam)} →</a>`

      return `
      <div class="game-nav">
        <div class="container">
          <div class="game-nav-inner">
            ${prevHtml}
            <span class="game-nav-count">Game ${gameId} of ${upcoming.length}</span>

    // ── Odds movement alerts ─────────────────────────────────────────────────
    function buildMovementAlerts() {
      const op = openingOdds?.[game.id];
      if (!op) return '';
      const alerts = [];

      // H2H movement (≥ $0.12 change)
      if (op.h2h?.home != null && Math.abs(game.h2h.home - op.h2h.home) >= 0.12) {
        const shortened = game.h2h.home < op.h2h.home;
        const team = game.homeTeam.name.split(' ').pop();
        alerts.push(`<div class="movement-alert-item">
          <strong>${team} H2H</strong>: $${op.h2h.home.toFixed(2)} → $${game.h2h.home.toFixed(2)}
          <span class="${shortened ? 'alert-sharp' : 'alert-drift'}">${shortened ? '🔴 Shortened — sharp money' : '🟢 Drifting — market fading'}</span>
        </div>`);
      }
      if (op.h2h?.away != null && Math.abs(game.h2h.away - op.h2h.away) >= 0.12) {
        const shortened = game.h2h.away < op.h2h.away;
        const team = game.awayTeam.name.split(' ').pop();
        alerts.push(`<div class="movement-alert-item">
          <strong>${team} H2H</strong>: $${op.h2h.away.toFixed(2)} → $${game.h2h.away.toFixed(2)}
          <span class="${shortened ? 'alert-sharp' : 'alert-drift'}">${shortened ? '🔴 Shortened — sharp money' : '🟢 Drifting — market fading'}</span>
        </div>`);
      }

      // Line movement (≥ 1.0 pt change)
      if (op.line?.home?.point != null) {
        const currPt = parseFloat(game.line.home.label) || 0;
        const openPt = op.line.home.point;
        const diff   = Math.abs(currPt - openPt);
        if (diff >= 1.0) {
          const home = game.homeTeam.name.split(' ').pop();
          const note = currPt < openPt ? `${home} now giving more points` : `${home} giving fewer points`;
          alerts.push(`<div class="movement-alert-item">
            <strong>Line moved ${diff.toFixed(1)} pts</strong>: ${openPt > 0 ? '+' : ''}${openPt} → ${currPt > 0 ? '+' : ''}${currPt}
            <span class="alert-note">${note}</span>
          </div>`);
        }
      }

      // O/U movement (≥ 1.5 pts)
      if (op.ou?.total != null && game.ou?.total != null) {
        const ouDiff = Math.abs(game.ou.total - op.ou.total);
        if (ouDiff >= 1.5) {
          const dir = game.ou.total > op.ou.total ? 'moved up' : 'moved down';
          alerts.push(`<div class="movement-alert-item">
            <strong>Total ${dir} ${ouDiff.toFixed(1)} pts</strong>: ${op.ou.total} → ${game.ou.total}
            <span class="alert-note">O/U line has shifted — check new pricing</span>
          </div>`);
        }
      }

      if (!alerts.length) return '';

      const since = new Date(op.firstSeen);
      const sinceStr = since.toLocaleDateString('en-AU', { day:'numeric', month:'short' })
        + ' ' + since.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });

      return `
      <div class="movement-alert">
        <div class="movement-alert-title">⚡ Market Movement — since opening (${sinceStr} AEST)</div>
        ${alerts.join('')}
      </div>`;
    }

    // ── Collapsible cards (mobile) ───────────────────────────────────────────
    function initCollapsibleCards() {
      if (window.innerWidth > 700) return;
      document.querySelectorAll('.card').forEach(card => {
        const label = card.querySelector('.card-label');
        if (!label) return;
        const children = Array.from(card.children).filter(c => c !== label);
        if (!children.length) return;
        const body = document.createElement('div');
        body.className = 'card-body';
        children.forEach(c => body.appendChild(c));
        card.appendChild(body);
        label.insertAdjacentHTML('beforeend', '<span class="card-toggle">▾</span>');
        label.addEventListener('click', () => {
          const isCollapsed = card.classList.toggle('collapsed');
          const tog = label.querySelector('.card-toggle');
          if (tog) tog.textContent = isCollapsed ? '▸' : '▾';
        });
      });
    }

                    ${isFavHome ? '<span class="odds-badge badge-fav">FAV</span>' : '<span class="odds-badge badge-dog">DOG</span>'}
                    <div class="impl">${impl(game.h2h.home)} chance</div>

                    <div class="impl">${impl(game.h2h.away)} chance</div>

              ${a._formRound

          <div class="card">
            <div class="card-label">📋 Named Teams</div>
            <div class="team-list-grid">
              <div class="team-list-col">
                <div class="team-list-col-label">
                  ${LOGOS[game.homeTeam.name] ? `<img src="${LOGOS[game.homeTeam.name]}" width="16" height="16" style="object-fit:contain">` : ''}
                  ${game.homeTeam.name.split(' ').pop()}
                </div>
                ${renderTeamList(game.homeTeam.name)}

              <div class="team-list-col">
                <div class="team-list-col-label">
                  ${LOGOS[game.awayTeam.name] ? `<img src="${LOGOS[game.awayTeam.name]}" width="16" height="16" style="object-fit:contain">` : ''}
                  ${game.awayTeam.name.split(' ').pop()}
                </div>
                ${renderTeamList(game.awayTeam.name)}

              ${teamLists?.round

          </div>

          <!-- HEAD-TO-HEAD RECORD -->
          <div class="card">
            <div class="card-label">Head-to-Head Record</div>
            ${renderH2H(game.homeTeam.name, game.awayTeam.name)}
            <div style="margin-top:10px;font-size:0.68rem;color:var(--text-2);opacity:0.7;border-top:1px solid rgba(255,255,255,0.05);padding-top:10px">

          <!-- SCORING PATTERNS -->
          <div class="card">

          <div class="card">

            <div class="injury-grid">
              <div>
                <div class="injury-col-label">
                  ${LOGOS[game.homeTeam.name] ? `<img src="${LOGOS[game.homeTeam.name]}" width="16" height="16" style="object-fit:contain">` : ''}

              <div>
                <div class="injury-col-label">
                  ${LOGOS[game.awayTeam.name] ? `<img src="${LOGOS[game.awayTeam.name]}" width="16" height="16" style="object-fit:contain">` : ''}
                  ${game.awayTeam.name.split(' ').pop()}

                ${renderCasualties(game.awayTeam.name)}
