            </div>
            <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2);display:flex;flex-wrap:wrap;gap:8px">
              <span><span class="inj-sev sev-minor" style="font-size:0.58rem">Minor</span> 1 round</span>
              <span><span class="inj-sev sev-moderate" style="font-size:0.58rem">Moderate</span> 2–3 rounds</span>
              <span><span class="inj-sev sev-serious" style="font-size:0.58rem">Serious</span> 4+ rounds</span>
              <span><span class="inj-sev sev-longterm" style="font-size:0.58rem">Long-term</span> TBC/Indefinite</span>
              <span><span class="inj-sev sev-suspended" style="font-size:0.58rem">Suspended</span></span>
            </div>
            <div class="injury-source">
              ${teamLists
                ? `📡 <a href="https://www.nrl.com/casualty-ward/?competition=111" target="_blank" rel="noopener">NRL.com Casualty Ward</a> — updated Round ${teamLists.round}`
                : `⚠️ Injury data unavailable`}
            </div>
          </div>

          <!-- TRY SCORER PICKS -->
          ${(() => {
            const propsKey = `${game.homeTeam.name} vs ${game.awayTeam.name}`;
            const realProps = playerProps?.games?.[propsKey];
            const hasRealOdds = realProps?.available && realProps?.players?.length;

            const realOdds = name => {
              if (!hasRealOdds) return null;
              // Fuzzy match: check if any real player name contains our name or vice versa
              const norm = n => n.toLowerCase().replace(/[^a-z]/g,'');

            return `
          <div class="card">
            <div class="card-label">Try Scorer Picks</div>
            ${hasRealOdds ? `<div style="font-size:0.7rem;color:var(--green);margin-bottom:10px;font-weight:600">✅ Real odds from ${realProps.bookmaker}</div>` : ''}
            <div class="player-picks-grid">
              <div class="player-pick-card">
                <div class="player-pick-header">
                  <div class="player-pick-team">${game.homeTeam.name.split(' ').pop()}</div>
                  ${LOGOS[game.homeTeam.name] ? `<img src="${LOGOS[game.homeTeam.name]}" width="22" height="22" style="object-fit:contain">` : ''}
                </div>
                ${homePlayers.map(renderPlayer).join('')}
              </div>
              <div class="player-pick-card">
                <div class="player-pick-header">
                  <div class="player-pick-team">${game.awayTeam.name.split(' ').pop()}</div>
                  ${LOGOS[game.awayTeam.name] ? `<img src="${LOGOS[game.awayTeam.name]}" width="22" height="22" style="object-fit:contain">` : ''}
                </div>
                ${awayPlayers.map(renderPlayer).join('')}
              </div>
            </div>
            <div style="margin-top:12px;font-size:0.7rem;color:var(--text-2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
              <span>${hasRealOdds
                ? `📡 Real odds from The Odds API (${realProps.bookmaker}) &nbsp;·&nbsp; <span class="odd-real">●</span> Real &nbsp; <span class="odd-derived">●</span> Estimated`
                : `📊 Odds estimated from 2026 season try-scoring rates &nbsp;·&nbsp; <span class="odd-derived">●</span> Estimated`}</span>
              <a href="https://www.sportsbet.com.au/betting/rugby-league-nrl" target="_blank" rel="noopener" style="font-size:0.72rem;font-weight:700;color:var(--green);white-space:nowrap">Check Sportsbet ↗</a>
            </div>
          </div>`;
          })()}

        </div><!-- /left -->

        <!-- RIGHT COLUMN -->
        <div>

          <!-- MATCH INTELLIGENCE -->
          <div class="card">
            <div class="card-label">Match Intelligence</div>
            <div class="fact-row">
              <div class="fact-label">Favourite</div>
              <div class="fact-val">${a.favourite}</div>
            </div>
            <div class="fact-row">
              <div class="fact-label">Confidence</div>
              <div class="fact-val">${a.confidenceLevel}</div>
            </div>
            <div class="fact-row">
              <div class="fact-label">Avg Margin</div>
              <div class="fact-val">${a.avgMargin}</div>
            </div>
            <div class="fact-row">
              <div class="fact-label">Weather</div>
              <div class="fact-val">${a.weatherForecast}</div>
            </div>
            ${(() => {
              const key = `${game.homeTeam.name} vs ${game.awayTeam.name}`;
              const d = h2hData?.matches?.[key];
              const ref = d?.referee;
              const ss = d?.seasonStats;
              const homeStreak = streakBadge(d?.homeForm);
              const awayStreak = streakBadge(d?.awayForm);
              return `
            ${(homeStreak || awayStreak) ? `
            <div class="fact-row" style="align-items:flex-start">
              <div class="fact-label">Form Streak</div>
              <div class="fact-val" style="text-align:right;line-height:1.8">
                ${homeStreak || ''}<br>${awayStreak || ''}
              </div>
            </div>` : ''}
            ${d?.overall ? (() => {
              const ov = d.overall;
              const hW = ov.homeWins || 0, hL = ov.awayWins || 0;
              const aW = ov.awayWins || 0, aL = ov.homeWins || 0;
              const hPct = (hW + hL) > 0 ? Math.round(hW / (hW + hL) * 100) : 0;
              const aPct = (aW + aL) > 0 ? Math.round(aW / (aW + aL) * 100) : 0;
              const hShort = game.homeTeam.name.split(' ').pop();
              const aShort = game.awayTeam.name.split(' ').pop();
              return `
            <div class="fact-row" style="align-items:flex-start">
              <div class="fact-label">Venue Record</div>
              <div class="fact-val" style="font-size:0.78rem;text-align:right;line-height:1.8">
                ${hShort} ${hW}W / ${hL}L (${hPct}%)<br>${aShort} ${aW}W / ${aL}L (${aPct}%)
              </div>
            </div>`;
            })() : ''}
            ${ref ? `
            <div class="fact-row">
              <div class="fact-label">Referee</div>
              <div class="fact-val"><a href="${ref.url}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none">${ref.name}</a></div>
            </div>` : `
            <div class="fact-row">
              <div class="fact-label">Referee</div>
              <div class="fact-val" style="color:var(--text-2);font-size:0.78rem">TBA — Thu night</div>
            </div>`}`;
            })()}
            <div class="fact-row">
              <div class="fact-label">Key Factor</div>
              <div class="fact-val" style="max-width:120px">${a.keyFactor}</div>
            </div>
            ${(() => {
              const v = calcValue(game, formData);
              if (!v) return '';
              return `
            <div class="fact-row" style="align-items:flex-start">
              <div class="fact-label">Value Rating</div>
              <div class="fact-val" style="text-align:right">
                ${v.badge}
                <div style="font-size:0.68rem;color:var(--text-2);margin-top:4px;line-height:1.4">${v.detail}</div>
                <div style="font-size:0.62rem;color:var(--text-2);opacity:0.6;margin-top:2px">Form · ladder · H2H · injuries</div>
              </div>
            </div>`;
            })()}
            <div class="rec-box">
              <div class="rec-title">💡 Analyst Take</div>
              <p>${a.recommendation}</p>
            </div>
          </div>

          <!-- BEST BETS -->
          <div class="card">
            <div class="card-label">Best Bets — By Risk Level</div>
            <div class="best-bets">
              ${[
                { pick: `${a.favourite} — Head to Head`,
                  odd: a.favourite === game.homeTeam.name ? game.h2h.home : game.h2h.away,
                  type: '🟢 Beginner', cls: '', estimated: false,
                  rationale: `Odds imply ${a.favourite === game.homeTeam.name ? homeWinPct : awayWinPct}% win chance. ${a.confidenceLevel} confidence based on current markets.` },
                { pick: `${a.favourite} Line ${a.favourite === game.homeTeam.name ? game.line.home.label : game.line.away.label}`,
                  odd: a.favourite === game.homeTeam.name ? game.line.home.odd : game.line.away.odd,
                  type: '🟢 Beginner', cls: '', estimated: false,
                  rationale: 'Handicap reduces risk — favourite still wins even giving points away.' },
                { pick: `${allPlayers[0]?.name} — Anytime Try Scorer`,
                  odd: anytimeOdd(allPlayers[0]),
                  type: '🟡 Intermediate', cls: 'medium', estimated: true,
                  rationale: `${allPlayers[0]?.name} (${allPlayers[0]?.pos}) is the highest-rated try threat in this match based on season stats.` },
                { pick: `Over ${game.ou.over.label} Total Points`,
                  odd: game.ou.over.odd,
                  type: '🟡 Intermediate', cls: 'medium', estimated: false,
                  rationale: `Both teams averaging over this line across recent form. ${a.weatherForecast.includes('Clear') || a.weatherForecast.includes('Fine') ? 'Clear conditions favour attacking play.' : 'Monitor conditions closer to kick-off.'}` },
                { pick: `${allPlayers[0]?.name} — First Try Scorer`,
                  odd: ftsOdd(allPlayers[0]),
                  type: '🔴 Expert', cls: 'high', estimated: true,
                  rationale: `High risk, high reward. Only for those comfortable with ~42% of anytime scorers getting first. Position: ${allPlayers[0]?.pos}.` },
              ].map(b => `
                <div class="best-bet-item ${b.cls}">
                  <div style="display:flex;align-items:center;justify-content:space-between">
                    <div class="best-bet-type">${b.type}</div>
                    <button class="add-multi-btn" onclick="addToMulti(this,'${b.pick.replace(/'/g,'\\\'')}',${ Number(b.odd).toFixed(2)})">+ Multi</button>
                  </div>
                  <div class="best-bet-pick">${b.pick}</div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div class="best-bet-odd">${toOddsStr(b.odd)}</div>
                    ${b.estimated ? '<span class="odds-estimated-tag">Estimated</span>' : '<span class="odds-live-tag">Live odds</span>'}
                  </div>
                  <div class="best-bet-rationale">${b.rationale}</div>
                </div>`).join('')}
            </div>
          </div>

          <!-- RESPONSIBLE GAMBLING -->
          <div style="background:rgba(255,165,0,0.07);border:1px solid rgba(255,165,0,0.2);border-radius:var(--radius-sm);padding:14px 16px;font-size:0.78rem;color:var(--text-2);line-height:1.5">
            ⚠️ <strong style="color:#ffa500">Gamble Responsibly</strong><br>
            Odds shown are educational simulations. Always set a budget and bet only what you can afford to lose. Help: <a href="https://www.gamblinghelponline.org.au" target="_blank">gamblinghelponline.org.au</a> or call 1800 858 858. 18+
          </div>

        </div><!-- /right -->


      </div><!-- /page-grid -->
    </div><!-- /container -->

    <footer class="footer">
      <div class="container">
        <p>🏉 <strong>NRLBettingGuide</strong> — For educational purposes only. Odds are simulated. Always gamble responsibly. 18+ only.</p>
        <p style="margin-top:8px">
          <a href="index.html">← Back to main guide</a>
          &nbsp;·&nbsp;
          <a href="season.html">📊 Season Dashboard</a>
        </p>
      </div>
    </footer>
    `;

    // Activate collapsible cards on mobile after HTML is in the DOM
    initCollapsibleCards();

  })();

  // ── Share ───────────────────────────────────────────────────────────────────
  function shareAnalysis() {
    const url = window.location.href;
    const btn = document.getElementById('shareBtn');
    const reset = () => { if (btn) btn.textContent = '🔗 Share'; };
    if (navigator.share) {
      navigator.share({ title: document.title, url }).catch(() => {});
      return;
    }
    navigator.clipboard.writeText(url).then(() => {
      if (btn) btn.textContent = '✓ Copied!';
      setTimeout(reset, 2000);
    }).catch(() => {
      prompt('Copy this link:', url);
    });
  }

  // ── Bet Slip ────────────────────────────────────────────────────────────────
  const SLIP_KEY = 'nrl_betslip';
  let slip = JSON.parse(localStorage.getItem(SLIP_KEY) || '[]');

  // Inject slip HTML into page
  document.body.insertAdjacentHTML('beforeend', `
    <div id="betSlip">
      <div class="betslip-header">
        <span class="betslip-title">🎯 Bet Slip</span>
        <button class="betslip-clear" onclick="clearSlip()">Clear all</button>
      </div>
      <div class="betslip-items" id="slipItems"></div>
      <div class="betslip-footer">
        <div class="betslip-combined" id="slipCombined"></div>
        <div class="betslip-return" id="slipReturn"></div>
      </div>
    </div>`);

  function renderSlip() {
    const el = document.getElementById('betSlip');
    if (!el) return;
    if (!slip.length) { el.classList.remove('open'); return; }
    el.classList.add('open');

    document.getElementById('slipItems').innerHTML = slip.map((b, i) => {
      const sourceLabel = b.source === 'home'
        ? `<span style="font-size:0.65rem;color:var(--green);opacity:0.6">🏠 </span>`
        : `<span style="font-size:0.65rem;color:var(--green);opacity:0.6">📊 </span>`;
      const gameCtx = b.game && b.source === 'home'
        ? `<div style="font-size:0.68rem;color:var(--text-2);margin-top:1px">${b.game}</div>` : '';
      return `
      <div class="betslip-item">
        <div class="betslip-item-desc">${sourceLabel}${b.pick}${gameCtx}</div>
        <div class="betslip-item-odd">$${Number(b.odd).toFixed(2)}</div>
        <button class="betslip-remove" onclick="removeFromSlip(${i})">✕</button>
      </div>`;
    }).join('');

    const multiOdd = slip.reduce((acc, b) => acc * Number(b.odd), 1);
    document.getElementById('slipCombined').innerHTML = `Combined: <strong>$${multiOdd.toFixed(2)}</strong>`;
    document.getElementById('slipReturn').textContent = `$10 stake → $${(10 * multiOdd).toFixed(2)} return`;
  }

  function saveSlip() { localStorage.setItem(SLIP_KEY, JSON.stringify(slip)); }

  function addToMulti(btn, pick, odd) {
    const idx = slip.findIndex(b => b.pick === pick && b.source === 'analysis');
    if (idx >= 0) {
      slip.splice(idx, 1);
      btn.classList.remove('added');
      btn.textContent = '+ Multi';
    } else {
      slip.push({
        id:     `analysis-${pick.replace(/\s+/g,'-').toLowerCase()}`,
        pick,
        team:   pick,
        odd,
        game:   game ? `${game.homeTeam.name} vs ${game.awayTeam.name}` : '',
        source: 'analysis',
      });
      btn.classList.add('added');
      btn.textContent = '✓ Added';
    }
    saveSlip();
    renderSlip();
  }

  function removeFromSlip(i) {
    slip.splice(i, 1);
    saveSlip();
    renderSlip();
  }

  function clearSlip() {
    slip = [];
    saveSlip();
    renderSlip();
    document.querySelectorAll('.add-multi-btn').forEach(b => {
      b.classList.remove('added');
      b.textContent = '+ Multi';
    });
  }

  renderSlip();
  </script>
</body>
</html>
